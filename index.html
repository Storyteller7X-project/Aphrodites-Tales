<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aphrodite's Tales</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%8F%9B%EF%B8%8F%3C/text%3E%3C/svg%3E"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060810;color:#e8d5b0;font-family:'Crimson Pro',Georgia,serif;font-size:18px}
  @keyframes reveal{0%{opacity:0;transform:scale(.4) rotateY(55deg)}70%{transform:scale(1.06) rotateY(0)}100%{opacity:1;transform:scale(1) rotateY(0)}}
  .revealcard{animation:reveal .55s cubic-bezier(.2,.8,.3,1.25) backwards}
  @keyframes shine{0%{left:-45%}100%{left:145%}}
  .packcard:hover .shine{animation:shine .9s ease}
  .packcard{transition:transform .12s,box-shadow .2s}
  .packcard:hover{transform:translateY(-4px)}
  @keyframes pullpop{0%{opacity:0;transform:scale(.5)}55%{transform:scale(1.18)}100%{opacity:1;transform:scale(1)}}
  .pullbanner{animation:pullpop .55s ease .35s backwards}
  @keyframes burst{0%{opacity:.9;transform:scale(.2)}100%{opacity:0;transform:scale(2.4)}}
  .burst{animation:burst .7s ease forwards}
  @keyframes pkflash{0%{opacity:0}7%{opacity:.95}100%{opacity:0}}
  @keyframes pkray{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
  @keyframes pkrayfade{0%{opacity:0}25%{opacity:.55}100%{opacity:.3}}
  @keyframes pkburst{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}10%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1)}}
  @keyframes pkcard{0%{opacity:0;transform:translateY(46px) scale(.45) rotateY(85deg)}55%{opacity:1;transform:translateY(-10px) scale(1.09) rotateY(0)}100%{opacity:1;transform:translateY(0) scale(1) rotateY(0)}}
  @keyframes glowpulse{0%,100%{box-shadow:0 0 15px var(--gc)}50%{box-shadow:0 0 38px var(--gc)}}
  @keyframes pkshake{0%,100%{transform:translate(0,0)}15%{transform:translate(-9px,5px)}30%{transform:translate(8px,-6px)}45%{transform:translate(-6px,4px)}60%{transform:translate(5px,-3px)}80%{transform:translate(-3px,2px)}}
  @keyframes pkbanner{0%{opacity:0;transform:scale(.3) rotate(-7deg)}60%{transform:scale(1.22) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes pkfloat{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
  .pk-flash{animation:pkflash .65s ease forwards}
  .pk-ray{animation:pkray 16s linear infinite,pkrayfade 1s ease forwards}
  .pk-particle{animation:pkburst .95s cubic-bezier(.15,.7,.4,1) forwards}
  .pk-card{animation:pkcard .62s cubic-bezier(.2,.8,.3,1.35) backwards}
  .pk-shake{animation:pkshake .6s ease}
  .pk-banner{animation:pkbanner .62s cubic-bezier(.2,.8,.3,1.45) .25s backwards}
  .pk-btns{animation:pkfloat .5s ease 1.35s backwards}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-thumb{background:#c8a96e44;border-radius:3px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glow{0%,100%{text-shadow:0 0 20px #c8a96e55}50%{text-shadow:0 0 44px #c8a96ecc}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .fu{animation:fadeUp .35s ease forwards}
  .glow{animation:glow 3s ease infinite}
  .spin{animation:spin 1.2s linear infinite}
  .btn{transition:transform .1s;cursor:pointer}
  .btn:active{transform:scale(.97)}
  .btn:disabled{cursor:not-allowed;opacity:.35}
  input{outline:none}
  a{color:#5599cc}
</style>
<!-- Firebase (Realtime Database) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

/* ---------- theme ---------- */
const C = {bg:"#060810",surface:"#0d0f18",dim:"#0a0c14",gold:"#c8a96e",text:"#e8d5b0",muted:"#7c715b",faint:"#3a3a3a"};
const sCard={background:C.surface,border:"1px solid #c8a96e28",borderRadius:"12px",padding:"18px"};
const sLbl={fontFamily:"'Cinzel',serif",fontSize:"13px",color:C.muted,letterSpacing:".1em",textTransform:"uppercase"};
const sInp={width:"100%",background:C.bg,border:"1px solid #c8a96e44",borderRadius:"8px",padding:"10px 14px",color:C.text,fontFamily:"'Crimson Pro',serif",fontSize:"21px"};
const wrap={display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"40px 20px",background:"radial-gradient(ellipse at 50% -10%,#1a1200,#060810 55%)"};

/* ---------- helpers ---------- */
function genPw(){const d="23456789",l="abcdefghjkmnpqrstuvwxyz";const r=a=>a[Math.floor(Math.random()*a.length)];return r(d)+r(l)+r(d)+r(l);}

/* ---------- data model (shared, in Firebase) ---------- */
function freshAdmin(){ return {password:"5r2w",role:"admin",coins:0,deck:null,starter:null,riotId:"",discordId:"",aphro:0}; }
function freshPlayer(pw){ return {password:pw,role:"player",coins:100,deck:null,starter:null,riotId:"",discordId:"",aphro:0}; }
function freshTest(){ return {password:"",role:"player",noPassword:true,coins:100,deck:null,starter:null,riotId:"",discordId:"",aphro:0}; }

const SEED = {
  users: { Storyteller: freshAdmin() },
  pending: {},
  season: 1,
  week: 1,
  prepEnded: false,     // false = Prep Time (players can edit), true = locked for matchday
  champion: null,
  tournament: { phase:"idle" },
};

/* ============================================================
   SETUP SCREEN (shown until you paste your Firebase config)
   ============================================================ */
function SetupScreen(){
  const steps = [
    ["Create a Firebase project", "console.firebase.google.com → Add project (any name, e.g. aphrodites-tales). You can skip Google Analytics."],
    ["Add a Web app", "In the project, click the </> (Web) icon → register an app → you'll get a firebaseConfig object."],
    ["Enable Realtime Database", "Left menu → Build → Realtime Database → Create Database → pick a location (europe-west1) → start in test mode."],
    ["Paste the config", "Open this index.html, find the firebaseConfig block near the top, and paste your values (apiKey, databaseURL, etc.). Save & reload."],
  ];
  return (
    <div style={wrap}>
      <div className="fu" style={{...sCard,maxWidth:"560px",width:"100%",borderColor:"#c8a96e55"}}>
        <div className="glow" style={{fontFamily:"'Cinzel',serif",fontSize:"27px",fontWeight:900,color:C.gold,letterSpacing:".1em",textAlign:"center",marginBottom:"6px"}}>APHRODITE'S TALES</div>
        <div style={{textAlign:"center",color:C.muted,fontSize:"16px",marginBottom:"18px"}}>Firebase setup required</div>
        {steps.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:"12px",marginBottom:"14px"}}>
            <div style={{flexShrink:0,width:"26px",height:"26px",borderRadius:"50%",background:"#c8a96e18",border:"1px solid #c8a96e55",color:C.gold,fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",color:C.text,fontSize:"17px",fontWeight:600,marginBottom:"3px"}}>{s[0]}</div>
              <div style={{fontSize:"16px",color:"#9c917b",lineHeight:1.6}}>{s[1]}</div>
            </div>
          </div>
        ))}
        <div style={{marginTop:"6px",padding:"12px 14px",background:C.dim,borderRadius:"8px",border:"1px solid #c8a96e22",fontSize:"15px",color:"#9c917b",lineHeight:1.6}}>
          Once connected, this same file works on every device and phone at once. Send me the config if you'd rather I plug it in.
        </div>

}

function Loading(){
  return (
    <div style={{...wrap,gap:"16px"}}>
      <div className="spin" style={{width:"44px",height:"44px",borderRadius:"50%",border:"3px solid #c8a96e33",borderTopColor:C.gold}}/>
      <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"16px",letterSpacing:".1em"}}>Connecting to the archive</div>
    </div>
  );
}

/* ============================================================
   LOGIN / REGISTER
   ============================================================ */
function Login({data,onLogin,onSpectator,onRegister}){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);

  function doLogin(){
    const n=name.trim();
    if(!n){setErr("Enter a username.");return;}
    if(n==="Spectator"){onSpectator();return;}
    const u=data.users&&data.users[n];
    if(!u){ setErr("Account not found."); return; }
    if(!u.noPassword && u.password!==pw){ setErr("Incorrect password."); return; }
    onLogin(n);
  }
  function doReg(){
    const n=name.trim();
    if(!n){setErr("Enter your Discord username.");return;}
    if(n==="Spectator"){setErr("Reserved name.");return;}
    if((data.users&&data.users[n])||(data.pending&&data.pending[n])){setErr("Name already taken or pending.");return;}
    onRegister(n);
    setDone(true);
  }

  if(done) return (
    <div style={wrap}>
      <div className="fu" style={{...sCard,maxWidth:"420px",width:"100%",textAlign:"center",borderColor:"#c8a96e55"}}>
        <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"18px",fontWeight:600,marginBottom:"10px"}}>Registration submitted</div>
        <div style={{fontSize:"16px",color:"#aaa",lineHeight:1.7}}>Your account <strong style={{color:C.text}}>{name.trim()}</strong> is pending. An admin will approve you and DM your password on Discord.</div>
        <button className="btn" onClick={()=>{setDone(false);setMode("login");setName("");}} style={{marginTop:"18px",padding:"9px 22px",background:"#c8a96e18",border:"1px solid #c8a96e44",borderRadius:"8px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>Back to login</button>
      </div>
    </div>
  );

  return (
    <div style={wrap}>
      <div style={{textAlign:"center",marginBottom:"30px"}}>
        <div className="glow" style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(32px,7.5vw,60px)",fontWeight:900,letterSpacing:".14em",lineHeight:1,background:"linear-gradient(180deg,#f7e0a4,#c8a96e 54%,#8a6636)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>APHRODITE'S TALES</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",marginTop:"12px"}}>
          <span style={{height:"1px",width:"56px",background:"linear-gradient(90deg,transparent,#c8a96e99)"}}/>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:"13px",color:C.muted,letterSpacing:".3em"}}>POWERED BY STORYTELLER</span>
          <span style={{height:"1px",width:"56px",background:"linear-gradient(90deg,#c8a96e99,transparent)"}}/>
        </div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"13px",color:"#5a5347",letterSpacing:".25em",marginTop:"7px"}}>v. 1.0.0</div>
      </div>
      <div className="fu" style={{width:"100%",maxWidth:"400px",display:"flex",flexDirection:"column",gap:"13px"}}>
        {mode==="login" ? (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Login</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Username" style={{...sInp,marginBottom:"8px"}}/>
              <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" type="password" style={sInp} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"16px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doLogin} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:900,letterSpacing:".15em"}}>ENTER</button>
            <div style={{padding:"13px",background:"#c8a96e08",border:"1px solid #c8a96e15",borderRadius:"10px",textAlign:"center"}}>
              <div style={{fontSize:"15px",color:C.muted,marginBottom:"9px"}}>Enter <strong style={{color:"#888"}}>Spectator</strong> as the username to watch (no password).</div>
              <button className="btn" onClick={()=>{setMode("register");setErr("");}} style={{padding:"5px 14px",background:"transparent",border:"1px solid #c8a96e33",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"13px"}}>Register new account →</button>
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Register</div>
              <div style={{fontSize:"16px",color:C.muted,marginBottom:"12px",lineHeight:1.6}}>Enter your Discord username. An admin will approve you and DM your password.</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Discord username" style={sInp}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"16px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doReg} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:900,letterSpacing:".15em"}}>SUBMIT REGISTRATION</button>
            <button className="btn" onClick={()=>{setMode("login");setErr("");}} style={{padding:"10px",background:"transparent",border:"1px solid #333",borderRadius:"8px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>← Back</button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   TOP BAR
   ============================================================ */
function TopBar({me,role,coins,onLogout}){
  return (
    <div style={{background:"#090b13",borderBottom:"1px solid #c8a96e1a",padding:"10px 18px",position:"sticky",top:0,zIndex:50,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{display:"flex",alignItems:"baseline",gap:"8px"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"22px",fontWeight:900,letterSpacing:".14em",background:"linear-gradient(180deg,#f2dca0,#c8a96e 58%,#96703c)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>APHRODITE'S TALES</div>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:"13px",color:"#6a6253"}}>v. 1.0.0</span>
        </div>
        <div style={{fontSize:"15px",color:C.muted,marginTop:"2px"}}>{me}{role==="admin"?" · Admin":""}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {role!=="admin" && <div style={{display:"flex",alignItems:"center",gap:"6px",background:"#c8a96e15",border:"1px solid #c8a96e44",borderRadius:"20px",padding:"4px 13px",fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"17px",fontWeight:600}}>{coins||0} coins</div>}
        <button className="btn" onClick={onLogout} style={{padding:"5px 10px",background:"transparent",border:"1px solid #333",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"13px"}}>Logout</button>
      </div>
    </div>
  );
}

/* ============================================================
   ADMIN HOME (foundation: approvals + roster + prep phase)
   ============================================================ */
function CoinGrant({onGive}){
  const [v,setV]=useState("");
  const n=parseInt(v,10);
  return <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
    <input value={v} onChange={e=>setV(e.target.value.replace(/[^0-9-]/g,""))} placeholder="coins" style={{width:"66px",background:"#0d0f18",border:"1px solid #333",borderRadius:"6px",padding:"6px 8px",color:"#e8d5b0",fontSize:"14px",outline:"none"}}/>
    <button className="btn" disabled={!n} onClick={()=>{ if(n){onGive(n);setV("");} }} style={{padding:"6px 11px",background:n?"#c8a96e18":"#0d0f18",border:"1px solid "+(n?"#c8a96e55":"#333"),borderRadius:"6px",color:n?"#c8a96e":"#555",fontFamily:"'Cinzel',serif",fontSize:"13px"}}>give</button>
  </div>;
}
function AdminHome({data,mutate,me}){
  const [atab,setAtab]=useState("home");
  const [msg,setMsg]=useState("");
  const [delArm,setDelArm]=useState("");
  const [resetArm,setResetArm]=useState(false);
  const pending=Object.keys(data.pending||{});
  const players=Object.keys(data.users||{}).filter(n=>data.users[n].role==="player");

  function approve(n){ mutate(d=>{ const p=d.pending&&d.pending[n]; if(!p)return d; const np=freshPlayer(p.password); np.coins=100+95*((d.week||1)-1); d.users[n]=np; delete d.pending[n]; return d; }); setMsg(n+" approved."); }
  function deny(n){ mutate(d=>{ if(d.pending) delete d.pending[n]; return d; }); }
  function togglePrep(){ mutate(d=>{ d.prepEnded=!d.prepEnded; return d; }); }
  function newWeek(){ mutate(d=>{ d.week=(d.week||1)+1; d.prepEnded=false; const us=d.users||{}; Object.keys(us).forEach(n=>{ if(us[n].role==="player") us[n].coins=(us[n].coins||0)+100; }); return d; }); setMsg("New week started. +100 coins to all players."); }
  function delPlayer(n){ mutate(d=>{ if(d.users) delete d.users[n]; return d; }); setDelArm(""); setMsg(n+" deleted."); }
  function resetAll(){ mutate(d=>{ const keep={}; Object.keys(d.users||{}).forEach(n=>{ if(d.users[n].role==="admin") keep[n]=d.users[n]; }); d.users=keep; d.pending={}; d.week=1; d.season=1; d.prepEnded=false; d.champion=null; d.tournament={started:false}; return d; }); setResetArm(false); setMsg("All test accounts cleared."); }
  function makeTests(){ mutate(d=>{ if(!d.users)d.users={}; for(let i=1;i<=8;i++){ d.users["Test"+i]=freshTest(); } d.testSeeded=true; return d; }); setMsg("8 test accounts ready (Test1-Test8, no password)."); }
  function grant(n,amt){ mutate(d=>{ if(d.users[n]) d.users[n].coins=Math.max(0,(d.users[n].coins||0)+amt); return d; }); }

  const tab=(t,label)=>(
    <button key={t} className="btn" onClick={()=>{setAtab(t);setMsg("");setDelArm("");setResetArm(false);}}
      style={{flex:1,padding:"9px 4px",background:atab===t?"#c8a96e18":"transparent",border:"1px solid "+(atab===t?"#c8a96e44":"transparent"),borderRadius:"7px",color:atab===t?C.gold:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:600,letterSpacing:".04em"}}>{label}</button>
  );

  return (
    <div style={{padding:"14px 18px",maxWidth:"640px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}} className="fu">
      <div style={{display:"flex",gap:"3px",background:"#090b12",borderRadius:"10px",padding:"4px",border:"1px solid #c8a96e1a"}}>
        {tab("home","Home")}{tab("players","Players")}{tab("bracket","Bracket")}
      </div>

      {atab==="home" && (
        <React.Fragment>
          <div style={sCard}>
            <div style={{...sLbl,marginBottom:"6px"}}>Season {data.season||1} · Week {data.week||1}</div>
            <div style={{fontSize:"15px",color:C.muted,marginBottom:"10px",lineHeight:1.6}}>{data.prepEnded ? "Decks are LOCKED for the matchday. Players cannot edit until you start the next week." : "Prep Time is OPEN. Players can buy, open packs, and remove cards."}</div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
              <button className="btn" onClick={togglePrep} style={{flex:1,minWidth:"150px",padding:"9px",background:data.prepEnded?"#1a1400":"#0d1a2a",border:"1px solid "+(data.prepEnded?"#c8a96e55":"#334466"),borderRadius:"8px",color:data.prepEnded?C.gold:"#5599cc",fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:600}}>{data.prepEnded?"Reopen Prep Time":"End Prep Time"}</button>
              <button className="btn" onClick={newWeek} style={{flex:1,minWidth:"150px",padding:"9px",background:"#0d1a12",border:"1px solid #2a5a3a",borderRadius:"8px",color:"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:600}}>Start next week (+100 all)</button>
            </div>
          </div>
          <div style={sCard}>
            <div style={{...sLbl,marginBottom:"10px"}}>Registrations ({pending.length})</div>
            {pending.length===0 && <div style={{fontSize:"16px",color:C.muted}}>No pending registrations.</div>}
            {pending.map(n=>(
              <div key={n} style={{display:"flex",alignItems:"center",gap:"12px",padding:"9px 0",borderBottom:"1px solid #c8a96e10"}}>

function PlayerHome({data,me,db,starters,mutate}){
  const u=data.users[me]||{};
  const deck=u.deck||[];
  const locked=!!data.prepEnded;
  const coins=u.coins||0;
  const [tab,setTab]=useState("deck");

  function pickStarter(name,deckArr){ mutate(d=>{ d.users[me].starter=name; d.users[me].deck=deckArr; return d; }); }
  function buyCard(code,price){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<price||deckRuleBlock(db,uu.deck||[],code)) return d; uu.coins=(uu.coins||0)-price; uu.deck=addToDeck(uu.deck||[],code); return d; }); }
  function removeCards(sel,cost){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<cost) return d; let dk=(uu.deck||[]).map(e=>({...e})); Object.keys(sel).forEach(code=>{ const e=dk.find(x=>x.code===code); if(e) e.count-=sel[code]; }); uu.deck=dk.filter(e=>e.count>0); uu.coins=(uu.coins||0)-cost; return d; }); }
  function chargePack(){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<ECON.PACK_COST) return d; uu.coins=(uu.coins||0)-ECON.PACK_COST; return d; }); }
  function keepPack(code){ mutate(d=>{ const uu=d.users[me]; if(deckRuleBlock(db,uu.deck||[],code)) return d; uu.deck=addToDeck(uu.deck||[],code); return d; }); }

  if(!u.starter || !deck.length) return <StarterSelect starters={starters} db={db} onPick={pickStarter}/>;

  const tb=(t,l)=>(<button key={t} className="btn" onClick={()=>setTab(t)} style={{flex:1,padding:"12px 4px",background:tab===t?"#c8a96e12":"transparent",border:"none",borderBottom:"2px solid "+(tab===t?C.gold:"transparent"),color:tab===t?C.gold:C.muted,fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600,letterSpacing:".04em"}}>{l}</button>);

  return (
    <div>
      {locked && <div style={{background:"#1a1400",borderBottom:"1px solid #c8a96e33",padding:"7px",textAlign:"center",fontFamily:"'Cinzel',serif",fontSize:"14px",color:C.gold}}>Prep Time is over. Your deck is locked for the matchday.</div>}
      <div style={{display:"flex",background:"#090b12",borderBottom:"1px solid #c8a96e1a",position:"sticky",top:0,zIndex:40}}>
        {tb("deck","My Deck")}{tb("store","Store")}{tb("packs","Buy Packs")}{tb("tourney","Tournament")}
      </div>
      {tab==="deck" && <DeckView db={db} deck={deck} locked={locked} coins={coins} onRemove={removeCards}/>}
      {tab==="store" && <Store db={db} deck={deck} coins={coins} locked={locked} onBuy={buyCard}/>}
      {tab==="packs" && <Packs db={db} deck={deck} coins={coins} locked={locked} onCharge={chargePack} onKeep={keepPack}/>}
      {tab==="tourney" && <Tournament data={data} me={me} role="player" mutate={mutate}/>}
    </div>
  );
}

const REGIONS=["Demacia","Freljord","Ionia","Noxus","Piltover & Zaun","Shadow Isles","Bilgewater","Shurima","Mount Targon","Bandle City"];
const REGCOL={Demacia:"#e3c44a",Freljord:"#62c4e8",Ionia:"#ef74b6",Noxus:"#d23b37","Piltover & Zaun":"#e58a26","Shadow Isles":"#2bb56e",Bilgewater:"#1fa8a8",Shurima:"#e0b133","Mount Targon":"#9a72d8","Bandle City":"#a9c24a"};
const RARCOL=["#8fa3b0","#5b8fd0","#b25fd6","#e0b040"];
const REGICON={Demacia:"demacia",Freljord:"freljord",Ionia:"ionia",Noxus:"noxus","Piltover & Zaun":"piltoverzaun","Shadow Isles":"shadowisles",Bilgewater:"bilgewater",Shurima:"shurima","Mount Targon":"targon","Bandle City":"bandlecity"};
function regIcon(r){ return "https://dd.b.pvp.net/latest/core/en_us/img/regions/icon-"+(REGICON[r]||r.toLowerCase().replace(/[^a-z]/g,""))+".png"; }
var _atx=null;
function packSfx(rars){
  try{
    if(!_atx) _atx=new (window.AudioContext||window.webkitAudioContext)();
    var ac=_atx; if(ac.state==="suspended") ac.resume();
    var now=ac.currentTime;
    function tone(type,f,at,dur,vol){ var o=ac.createOscillator(),g=ac.createGain(); o.type=type; o.frequency.value=f; g.gain.setValueAtTime(0.0001,at); g.gain.exponentialRampToValueAtTime(vol,at+0.02); g.gain.exponentialRampToValueAtTime(0.0001,at+dur); o.connect(g).connect(ac.destination); o.start(at); o.stop(at+dur+0.03); }
    var o=ac.createOscillator(),g=ac.createGain(); o.type="sawtooth"; o.frequency.setValueAtTime(85,now); o.frequency.exponentialRampToValueAtTime(430,now+0.45); g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(0.05,now+0.05); g.gain.exponentialRampToValueAtTime(0.0001,now+0.5); o.connect(g).connect(ac.destination); o.start(now); o.stop(now+0.55);
    var scale=[0,2,4,7,9];
    for(var i=0;i<rars.length;i++){ var f=523.25*Math.pow(2,scale[i%5]/12); tone("sine",f,now+0.55+i*0.15,0.22,0.07+(rars[i]>=2?0.03:0)); }
    var best=Math.max.apply(null,rars);
    if(best>=3){ [523,659,784,1047,1319].forEach(function(f,j){ tone("triangle",f,now+1.35+j*0.07,0.75,0.075); }); }
    else if(best>=2){ [523,659,784].forEach(function(f,j){ tone("triangle",f,now+1.35+j*0.07,0.5,0.06); }); }
  }catch(e){}
}
function RegionLogo({r,size}){

const ECON={PACK_COST:1,DECK_FLOOR:10,DECK_MAX:100,MAX_COPIES:3,MAX_CHAMPS:20,PACK_SIZE:5};

function buildDB(cards){
  const by={}; cards.forEach(c=>{ by[c[0]]=c; });
  const pools={}, runeChamps={}; REGIONS.forEach(r=>{pools[r]=[];runeChamps[r]=[];});
  cards.forEach(c=>{ const regs=c[5]||[]; REGIONS.forEach(r=>{ if(regs.indexOf(r)>=0||regs.indexOf("Runeterra ("+r+")")>=0) pools[r].push(c[0]); if(c[4]===1&&regs.indexOf("Runeterra ("+r+")")>=0) runeChamps[r].push(c[1]); }); });
  return {list:cards, by, pools, runeChamps};
}
const cCode=c=>c[0], cName=c=>c[1], cMana=c=>c[2], cRar=c=>c[3], cChamp=c=>c[4]===1, cRegs=c=>c[5]||[], cCoin=c=>c[6], cImg=c=>c[8]||"";
function coinOf(db,code){ const c=db.by[code]; return c?cCoin(c):20; }
function isChampCode(db,code){ const c=db.by[code]; return !!c&&cChamp(c); }
function deckTotal(deck){ return (deck||[]).reduce((s,e)=>s+(e.count||0),0); }
function uniqueChamps(db,deck){ return (deck||[]).filter(e=>isChampCode(db,e.code)).length; }
function copiesOf(deck,code){ const e=(deck||[]).find(x=>x.code===code); return e?e.count:0; }
function addToDeck(deck,code){ const d=(deck||[]).map(e=>({...e})); const e=d.find(x=>x.code===code); if(e)e.count++; else d.push({code,count:1}); return d; }
function deckRuleBlock(db,deck,code){
  if(deckTotal(deck)>=ECON.DECK_MAX) return "Deck full ("+ECON.DECK_MAX+")";
  if(copiesOf(deck,code)>=ECON.MAX_COPIES) return "Max "+ECON.MAX_COPIES+" copies";
  if(isChampCode(db,code)&&copiesOf(deck,code)===0&&uniqueChamps(db,deck)>=ECON.MAX_CHAMPS) return "Max "+ECON.MAX_CHAMPS+" champions";
  return null;
}
function removalCost(n){ if(n>=100)return 1; if(n>=90)return 2; if(n>=80)return 5; if(n>=70)return 10; if(n>=60)return 20; if(n>=50)return 50; if(n>=40)return 100; if(n>=30)return 200; if(n>=20)return 500; if(n>=11)return 1000; return 0; }
function removalBatch(n){ return Math.max(0,Math.min(10,n-ECON.DECK_FLOOR)); }
function rollPack(db,pool){
  if(!pool||!pool.length) return [];
  let total=0; for(let k=0;k<pool.length;k++) total+=1/coinOf(db,pool[k]);
  const out=[];
  for(let i=0;i<ECON.PACK_SIZE;i++){
    let r=Math.random()*total, idx=pool.length-1;
    for(let k=0;k<pool.length;k++){ r-=1/coinOf(db,pool[k]); if(r<=0){ idx=k; break; } }
    out.push(pool[idx]);
  }
  return out;
}

function DeckView({db,deck,locked,coins,onRemove}){
  const [sellMode,setSellMode]=useState(false);
  const [sel,setSel]=useState({});
  const total=deckTotal(deck), batch=removalBatch(total), cost=removalCost(total);
  const selTotal=Object.values(sel).reduce((a,b)=>a+b,0);
  const entries=(deck||[]).map(e=>({...e,card:db.by[e.code]})).filter(e=>e.card);
  entries.sort((a,b)=>cMana(a.card)-cMana(b.card)||cName(a.card).localeCompare(cName(b.card)));
  const champs=entries.filter(e=>cChamp(e.card)), cards=entries.filter(e=>!cChamp(e.card));

  function tapSell(code){
    const have=copiesOf(deck,code);
    setSel(prev=>{ const cur=prev[code]||0; const others=Object.values(prev).reduce((a,b)=>a+b,0)-cur;
      if(cur>=have){ const n={...prev}; delete n[code]; return n; }
      if(others+cur+1>batch) return prev;
      return {...prev,[code]:cur+1}; });
  }
  function confirm(){ if(selTotal<1||selTotal>batch||coins<cost) return; onRemove(sel,cost); setSellMode(false); setSel({}); }

  const group=(title,list)=>(
    <div style={{marginBottom:"14px"}}>
      <div style={{...sLbl,marginBottom:"8px"}}>{title}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
        {list.map(e=>{ const s=sel[e.code]||0;
          return <CardThumb key={e.code} card={e.card} w={72} onClick={sellMode?()=>tapSell(e.code):undefined} badge={e.count>1?("x"+e.count):undefined} dim={sellMode&&s>0} sub={sellMode&&s>0?("- "+s):undefined}/>; })}
      </div>
    </div>
  );

  return (
    <div style={{padding:"14px 18px",maxWidth:"760px",margin:"0 auto"}} className="fu">

/* ============================================================
   TOURNAMENT (check-in + Swiss)
   ============================================================ */
function swissRounds(n){ return Math.max(1, Math.ceil(Math.log2(Math.max(2,n)))+1); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const x=a[i]; a[i]=a[j]; a[j]=x; } return a; }
function computeRecords(players,rounds){
  const rec={}; players.forEach(p=>rec[p]={w:0,l:0,opps:[],bye:false});
  (rounds||[]).forEach(rd=>(rd.matches||[]).forEach(m=>{ if(!m.confirmed) return;
    if(m.bye){ if(rec[m.a]){rec[m.a].w++; rec[m.a].bye=true;} return; }
    const w=m.winner, l=(m.a===w?m.b:m.a);
    if(rec[w])rec[w].w++; if(rec[l])rec[l].l++;
    if(rec[m.a])rec[m.a].opps.push(m.b); if(rec[m.b])rec[m.b].opps.push(m.a);
  }));
  return rec;
}
function buch(u,rec){ return (rec[u]&&rec[u].opps||[]).reduce((s,o)=>s+(rec[o]?rec[o].w:0),0); }
function standing(players,rec){ return players.slice().sort((x,y)=>((rec[y].w-rec[y].l)-(rec[x].w-rec[x].l))||(rec[y].w-rec[x].w)||(buch(y,rec)-buch(x,rec))||x.localeCompare(y)); }
function pairRound(sorted,rec){
  let pool=sorted.slice(); const matches=[];
  if(pool.length%2===1){ let bi=-1; for(let i=pool.length-1;i>=0;i--){ if(!rec[pool[i]].bye){bi=i;break;} } if(bi<0)bi=pool.length-1; const bye=pool.splice(bi,1)[0]; matches.push({a:bye,b:null,winner:bye,confirmed:true,bye:true,report:null}); }
  while(pool.length>1){ const a=pool.shift(); let idx=pool.findIndex(b=>!(rec[a].opps||[]).includes(b)); if(idx<0)idx=0; const b=pool.splice(idx,1)[0]; matches.push({a,b,winner:null,confirmed:false,report:null}); }
  return matches;
}
const TRI_DEPS={ B1:[["l","A1"],["w","A2"]], B2:[["l","A2"],["w","A3"]], B3:[["w","A4"],["l","A3"]], C1:[["l","B1"],["w","B2"]], C2:[["l","B2"],["w","B3"]], D1:[["l","C1"],["w","C2"]] };
const TRI_ROUNDS=[["A1","A2","A3","A4"],["B1","B2","B3"],["C1","C2"],["D1"]];
const TRI_POS={ A1:{r:1,c:4}, A2:{r:2,c:3}, A3:{r:3,c:2}, A4:{r:4,c:1}, B1:{r:2,c:4}, B2:{r:3,c:3}, B3:{r:4,c:2}, C1:{r:3,c:4}, C2:{r:4,c:3}, D1:{r:4,c:4} };
const TRI_WIN={ A1:{r:1,c:5}, B1:{r:2,c:5}, C1:{r:3,c:5}, D1:{r:4,c:5} };
const TRI_LOSE={ A4:{r:5,c:1}, B3:{r:5,c:2}, C2:{r:5,c:3}, D1:{r:5,c:4} };
function triRes(m,side){ if(!m||!m.confirmed)return null; return side==="w"?m.winner:(m.winner===m.a?m.b:m.a); }
function seedTri(S){
  const s=S.slice(0,8); while(s.length<8)s.push(null); const tri={};
  [["A1",0,1],["A2",2,3],["A3",4,5],["A4",6,7]].forEach(([k,i,j])=>tri[k]={a:s[i]||null,b:s[j]||null,winner:null,confirmed:false,report:null});
  ["B1","B2","B3","C1","C2","D1"].forEach(k=>tri[k]={a:null,b:null,winner:null,confirmed:false,report:null});
  ["A1","A2","A3","A4"].forEach(k=>{const m=tri[k]; if(m.a&&!m.b){m.winner=m.a;m.confirmed=true;} else if(!m.a&&m.b){m.winner=m.b;m.confirmed=true;}});
  triRecompute(tri); return tri;
}
function triRecompute(tri){
  let ch=true;
  while(ch){ ch=false;
    for(const k in TRI_DEPS){ if(tri[k].confirmed)continue; const [d1,d2]=TRI_DEPS[k]; const s1=tri[d1[1]],s2=tri[d2[1]];
      if(s1.confirmed&&s2.confirmed){ const a=triRes(s1,d1[0]),b=triRes(s2,d2[0]); tri[k].a=a; tri[k].b=b;
        if(a&&!b){tri[k].winner=a;tri[k].confirmed=true;ch=true;} else if(!a&&b){tri[k].winner=b;tri[k].confirmed=true;ch=true;} else if(!a&&!b){tri[k].winner=null;tri[k].confirmed=true;ch=true;} }
      else { tri[k].a=null; tri[k].b=null; } } }
}
function triW(tri,k){ return tri[k]&&tri[k].confirmed?tri[k].winner:null; }
function triL(tri,k){ return triRes(tri[k],"l"); }
function triPlacements(tri){ return {1:triW(tri,"A1"),2:triW(tri,"D1"),3:triW(tri,"C1"),4:triW(tri,"B1")}; }
const F2ID={DE:0,FR:1,IO:2,NX:3,PZ:4,SI:5,BW:6,SH:7,MT:9,BC:10,RU:12};
const FAC_MINVER={DE:1,FR:1,IO:1,NX:1,PZ:1,SI:1,BW:2,MT:2,SH:3,BC:4,RU:5};
const B32A="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
function b32enc(bytes){ let bits=0,val=0,out=""; for(let i=0;i<bytes.length;i++){ val=((val<<8)|bytes[i]); bits+=8; while(bits>=5){ bits-=5; out+=B32A[(val>>>bits)&31]; } val=val&((1<<bits)-1); } if(bits>0){ out+=B32A[(val<<(5-bits))&31]; } return out; }
function encodeDeck(cards){
  if(!cards||!cards.length) return "";
  let ver=1; cards.forEach(c=>{ const v=FAC_MINVER[c.code.slice(2,4)]||1; if(v>ver)ver=v; });
  const out=[(1<<4)|ver];
  function wv(v){ v=v>>>0; while(true){ let b=v&0x7F; v=Math.floor(v/128); if(v){out.push(b|0x80);} else {out.push(b);break;} } }
  const P=cards.map(c=>({set:parseInt(c.code.slice(0,2),10),fac:c.code.slice(2,4),num:parseInt(c.code.slice(4),10),count:c.count,code:c.code}));
  [3,2,1].forEach(cnt=>{
    const grp={}; P.filter(x=>x.count===cnt).forEach(x=>{ const k=x.set+"|"+x.fac; (grp[k]=grp[k]||[]).push(x.num); });
    const groups=Object.keys(grp).map(k=>{ const pp=k.split("|"); return {set:+pp[0],fac:pp[1],nums:grp[k].sort((a,b)=>a-b)}; });
    groups.sort((a,b)=> a.nums.length-b.nums.length || a.set-b.set || a.fac.localeCompare(b.fac));
    wv(groups.length);
    groups.forEach(g=>{ wv(g.nums.length); wv(g.set); wv(F2ID[g.fac]); g.nums.forEach(n=>wv(n)); });
  });
  P.filter(x=>x.count>3).sort((a,b)=>a.code.localeCompare(b.code)).forEach(x=>{ wv(x.count); wv(x.set); wv(F2ID[x.fac]); wv(x.num); });
  return b32enc(out);
}
function deckUrl(deck){ const c=encodeDeck(deck||[]); return c?("https://runeterra.ar/decks/code/"+c):null; }

function Tournament({data,me,role,mutate}){
  const t=data.tournament||{phase:"idle"};
  const isAdmin=role==="admin";
  const players=t.players||[];
  const rounds=t.rounds||[];
  const rec=computeRecords(players,rounds);
  const stand=standing(players,rec);
  const ci=Object.keys(t.checkin||{});

  const [nowTs,setNowTs]=useState(Date.now());
  useEffect(()=>{ const id=setInterval(()=>setNowTs(Date.now()),30000); return ()=>clearInterval(id); },[]);
  function openTournament(){ mutate(d=>{ d.tournament={phase:"signup",name:"",server:"EMEA",startTime:Date.now()+2*3600000,signups:{},checkin:{}}; return d; }); }
  function setStart(ts){ mutate(d=>{ d.tournament.startTime=ts; return d; }); }
  function setServer(sv){ mutate(d=>{ d.tournament.server=sv; return d; }); }
  function setName(nm){ mutate(d=>{ d.tournament.name=nm; return d; }); }
  function signUp(riot,disc){ mutate(d=>{ const tt=d.tournament; if(tt.phase!=="signup")return d; if(!tt.signups)tt.signups={}; tt.signups[me]={riotId:riot,discordId:disc}; if(d.users[me]){ d.users[me].riotId=riot; d.users[me].discordId=disc; } return d; }); }
  function startSwiss(){ mutate(d=>{ const list=Object.keys(d.tournament.checkin||{}); if(list.length<2)return d; const R=swissRounds(list.length); const order=shuffle(list); const rc=computeRecords(list,[]); const m=pairRound(order,rc); d.tournament={phase:"swiss",checkin:d.tournament.checkin,players:list,round:1,totalRounds:R,rounds:[{matches:m}]}; return d; }); }
  function confirmMatch(ri,mi){ mutate(d=>{ const mm=d.tournament.rounds[ri].matches[mi]; if(!mm.report)return d; mm.winner=mm.report.winner; mm.confirmed=true; return d; }); }
  function setWinner(ri,mi,w){ mutate(d=>{ const mm=d.tournament.rounds[ri].matches[mi]; mm.winner=w; mm.confirmed=true; mm.report={winner:w,by:"admin"}; return d; }); }
  function undo(ri,mi){ mutate(d=>{ const mm=d.tournament.rounds[ri].matches[mi]; mm.confirmed=false; mm.winner=null; mm.report=null; return d; }); }
  function nextRound(){ mutate(d=>{ const tt=d.tournament; const cur=tt.rounds[tt.round-1]; if(cur.matches.some(m=>!m.confirmed))return d; if(tt.round>=tt.totalRounds)return d; const rc=computeRecords(tt.players,tt.rounds); const order=standing(tt.players,rc); const m=pairRound(order,rc); tt.rounds.push({matches:m}); tt.round++; return d; }); }
  function reset(){ mutate(d=>{ d.tournament={phase:"idle"}; return d; }); }
  function checkIn(){ mutate(d=>{ const tt=d.tournament; if(tt.phase!=="signup")return d; if(!tt.signups||!tt.signups[me])return d; if(Date.now()<(tt.startTime-3600000))return d; if(!tt.checkin)tt.checkin={}; if(tt.checkin[me])return d; tt.checkin[me]=true; if(d.users[me])d.users[me].coins=(d.users[me].coins||0)+5; return d; }); }
  function report(ri,mi,winner){ mutate(d=>{ const mm=d.tournament.rounds[ri].matches[mi]; if(mm.confirmed)return d; mm.report={winner,by:me}; return d; }); }
  function startTriangle(){ mutate(d=>{ const tt=d.tournament; const rc=computeRecords(tt.players,tt.rounds); const ord=standing(tt.players,rc); tt.tri=seedTri(ord.slice(0,8)); tt.phase="triangle"; return d; }); }
  function reportTri(k,winner){ mutate(d=>{ const mm=d.tournament.tri[k]; if(mm.confirmed)return d; mm.report={winner,by:me}; return d; }); }
  function confirmTri(k){ mutate(d=>{ const tt=d.tournament; const mm=tt.tri[k]; if(!mm.report)return d; mm.winner=mm.report.winner; mm.confirmed=true; triRecompute(tt.tri); if(tt.tri.D1.confirmed){ tt.phase="done"; tt.champion=triW(tt.tri,"A1"); tt.placements=triPlacements(tt.tri); } return d; }); }
  function setTriWinner(k,w){ mutate(d=>{ const tt=d.tournament; const mm=tt.tri[k]; mm.winner=w; mm.confirmed=true; mm.report={winner:w,by:"admin"}; triRecompute(tt.tri); if(tt.tri.D1.confirmed){ tt.phase="done"; tt.champion=triW(tt.tri,"A1"); tt.placements=triPlacements(tt.tri); } return d; }); }
  function awardAP(){ mutate(d=>{ const pl=d.tournament.placements||{}; const pts={1:5,2:3,3:2,4:1}; [1,2,3,4].forEach(k=>{ const u=pl[k]; if(u&&d.users[u]) d.users[u].aphro=(d.users[u].aphro||0)+pts[k]; }); d.tournament.awarded=true; return d; }); }

  const box={...sCard,marginBottom:"12px"};
  const wrap={padding:"14px 18px",maxWidth:"720px",margin:"0 auto"};

  if(t.phase==="idle"){
    return <div style={wrap} className="fu"><div style={{...box,textAlign:"center"}}>
      <div style={{...sLbl,marginBottom:"8px"}}>Tournament</div>
      <div style={{fontSize:"16px",color:C.muted,lineHeight:1.6,marginBottom:isAdmin?"14px":0}}>No tournament is running right now.</div>
      {isAdmin&&(data.prepEnded
        ? <button className="btn" onClick={openTournament} style={{padding:"11px 22px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"9px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"16px",fontWeight:900}}>Open new tournament</button>
        : <div style={{fontSize:"15px",color:"#a66",fontFamily:"'Cinzel',serif"}}>End Prep Time first to open a tournament.</div>)}
    </div></div>;
  }

  if(t.phase==="signup"){
    const su=t.signups||{}; const suList=Object.keys(su);
    const reg=me&&su[me]; const inCi=t.checkin&&me&&t.checkin[me];
    const isPlayer=me&&data.users[me]&&data.users[me].role==="player";
    const ciOpen=nowTs>=(t.startTime-3600000);
    const startLocal=new Date(t.startTime).toLocaleString("en-US", {weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",hour12:true});
    const ciLocal=new Date(t.startTime-3600000).toLocaleString("en-US", {hour:"numeric",minute:"2-digit",hour12:true});
    const mins=Math.round((t.startTime-nowTs)/60000);
    const rel=mins>0?(mins>=60?("in "+Math.floor(mins/60)+"h "+(mins%60)+"m"):("in "+mins+"m")):"now";
    return <div style={wrap} className="fu">
      <div style={box}>
        <div style={{...sLbl,marginBottom:"6px"}}>{t.name?t.name+" · sign-ups open":"Tournament sign-ups open"}</div>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}}>
          <div style={{fontSize:"17px",color:C.text}}>Starts <strong style={{color:C.gold}}>{startLocal}</strong> <span style={{color:C.muted,fontSize:"15px"}}>({rel}, your local time)</span></div>
          <div style={{fontSize:"16px",color:REGCOL[t.server==="AM"?"Demacia":"Freljord"],fontFamily:"'Cinzel',serif"}}>Server: {t.server}</div>
        </div>
      </div>

      {isAdmin&&<div style={box}>
        <div style={{...sLbl,marginBottom:"10px"}}>Tournament settings</div>
        <div style={{marginBottom:"12px"}}><div style={{fontSize:"14px",color:C.muted,marginBottom:"6px"}}>Tournament name</div><TournamentNameInput name={t.name} onSet={setName}/></div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px",flexWrap:"wrap"}}>
          <span style={{fontSize:"15px",color:C.muted,width:"70px"}}>Start time</span>
          <StartTimeInput startTime={t.startTime} onSet={setStart}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
          <span style={{fontSize:"15px",color:C.muted,width:"70px"}}>Server</span>
          {["EMEA","AM"].map(sv=><button key={sv} className="btn" onClick={()=>setServer(sv)} style={{padding:"6px 16px",background:t.server===sv?"#c8a96e22":"transparent",border:"1px solid "+(t.server===sv?"#c8a96eaa":"#333"),borderRadius:"7px",color:t.server===sv?C.gold:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>{sv}</button>)}
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          <button className="btn" disabled={ci.length<2} onClick={startSwiss} style={{flex:1,padding:"11px",background:ci.length>=2?"linear-gradient(135deg,#c8a96e,#9a7440)":"#111",border:"none",borderRadius:"9px",color:ci.length>=2?C.bg:C.faint,fontFamily:"'Cinzel',serif",fontSize:"16px",fontWeight:900}}>Start Swiss round 1 ({ci.length} checked in)</button>
          <button className="btn" onClick={reset} style={{padding:"11px 16px",background:"transparent",border:"1px solid #5a2a2a",borderRadius:"9px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"15px"}}>Cancel</button>
        </div>
        <div style={{fontSize:"13px",color:"#5a5347",marginTop:"8px"}}>Only checked-in players are seeded. Anyone who did not check in is dropped.</div>
      </div>}

      {isPlayer&&<div style={box}>
        {!reg
          ? <SignUpForm onSubmit={signUp} me={me} data={data}/>
          : <div>
              <div style={{...sLbl,marginBottom:"8px"}}>You are registered</div>
              <div style={{fontSize:"16px",color:C.muted,marginBottom:"12px"}}>Riot ID: <strong style={{color:C.text}}>{su[me].riotId}</strong> · Discord: <strong style={{color:C.text}}>{su[me].discordId}</strong></div>
              {inCi
                ? <div style={{padding:"11px",background:"#0d1a12",border:"1px solid #2a5a3a",borderRadius:"9px",color:"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"16px",textAlign:"center"}}>Checked in</div>
                : (ciOpen
                    ? <button className="btn" onClick={checkIn} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:900,letterSpacing:".04em"}}>Check in (+5 coins)</button>
                    : <div style={{padding:"11px",background:"#0d0f18",border:"1px solid #333",borderRadius:"9px",color:C.muted,fontSize:"15px",textAlign:"center"}}>Check-in opens at {ciLocal} (1 hour before start). If you miss it, you are dropped.</div>)}
            </div>}
      </div>}

      <div style={box}>
        <div style={{...sLbl,marginBottom:"10px"}}>Registered ({suList.length})</div>
        {suList.length===0&&<div style={{fontSize:"16px",color:C.muted}}>Nobody yet.</div>}
        {suList.map(n=>{ const u=data.users[n]||{}; const url=deckUrl(u.deck); const checked=t.checkin&&t.checkin[n];
          return (
            <div key={n} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",padding:"8px 0",borderBottom:"1px solid #c8a96e10"}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:"16px",color:C.text}}>{n}{checked?<span style={{color:"#6ac68a",fontSize:"13px",fontFamily:"'Cinzel',serif"}}> · checked in</span>:null}</div>
                <div style={{fontSize:"13px",color:C.muted}}>{su[n].riotId}</div>
              </div>
              {url?<a href={url} target="_blank" rel="noopener noreferrer" style={{flexShrink:0,fontSize:"15px",color:"#5599cc",textDecoration:"none",fontFamily:"'Cinzel',serif"}}>view deck ↗</a>:<span style={{fontSize:"13px",color:"#3a3a3a"}}>no deck</span>}
            </div>
          ); })}
      </div>
    </div>;
  }

  if(t.phase==="triangle" || t.phase==="done"){
    const tri=t.tri||{};
    const nm=n=>n||"-";
    const nameCell=(k,nm)=>{ const m=tri[k]; if(!nm) return <div style={{padding:"5px 6px",borderRadius:"5px",background:"#0a0b10",border:"1px solid #1a1a1a",color:"#3a3a3a",fontSize:"14px"}}>-</div>;
      const won=m.confirmed&&m.winner===nm; const pend=!m.confirmed&&m.report&&m.report.winner===nm; const mine=me&&(m.a===me||m.b===me); const clickable=m.a&&m.b&&!m.confirmed&&(mine||isAdmin);
      const onClick=clickable?()=>{ if(isAdmin) setTriWinner(k,nm); else reportTri(k,nm); }:undefined;
      return <div onClick={onClick} className={clickable?"btn":""} style={{padding:"5px 7px",borderRadius:"5px",background:won?"#173217":pend?"#2a2400":"#0d0f18",border:"1px solid "+(won?"#3a6a3a":pend?"#5a4a1a":"#262626"),color:won?"#9d9":pend?"#e0b040":(nm===me?C.gold:C.text),fontSize:"14px",cursor:clickable?"pointer":"default",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:nm===me?600:400}}>{nm}</div>; };
    const matchBox=(k)=>{ const m=tri[k]; if(!m) return null; const ready=m.a&&m.b; const pos=TRI_POS[k];
      return <div key={k} style={{gridColumn:pos.c,gridRow:pos.r,alignSelf:"center"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"13px",color:C.muted,marginBottom:"2px",letterSpacing:".08em"}}>{k}</div>
        <div style={{display:"flex",flexDirection:"column",gap:"3px",padding:"4px",background:"#090b12",border:"1px solid "+(m.confirmed?"#c8a96e30":ready?"#2f2f2f":"#171717"),borderRadius:"7px",opacity:ready?1:0.45}}>
          {nameCell(k,m.a)}{nameCell(k,m.b)}
          {isAdmin&&ready&&!m.confirmed&&m.report&&<button className="btn" onClick={()=>confirmTri(k)} style={{padding:"3px",background:"#1a3a1a",border:"1px solid #3a6a3a",borderRadius:"4px",color:"#8c8",fontSize:"13px",fontFamily:"'Cinzel',serif"}}>confirm {m.report.winner}</button>}
        </div>
      </div>; };
    const winBox=(k)=>{ const w=triW(tri,k); const pos=TRI_WIN[k]; const champ=k==="A1";
      return <div key={"w"+k} style={{gridColumn:pos.c,gridRow:pos.r,alignSelf:"center"}}>
        <div style={{padding:champ?"9px 6px":"8px 6px",borderRadius:"7px",background:champ?(w?"#2a2000":"#171200"):(w?"#142410":"#0d120a"),border:"1px solid "+(champ?(w?"#c8a96e":"#3a2f10"):(w?"#4a7a2a":"#243318")),textAlign:"center",boxShadow:champ&&w?"0 0 16px #c8a96e44":"none"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"13px",color:champ?"#c8a96e":"#7aaa4a",letterSpacing:".1em",marginBottom:"2px"}}>{champ?"CHAMPION":"Winner "+k}</div>
          <div style={{fontSize:champ?"16px":"14px",color:w?(champ?C.gold:"#b8e090"):"#3a3a3a",fontWeight:champ?900:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{w||"-"}</div>
        </div>
      </div>; };
    const loseBox=(k)=>{ const l=triL(tri,k); const pos=TRI_LOSE[k];
      return <div key={"l"+k} style={{gridColumn:pos.c,gridRow:pos.r,alignSelf:"center"}}>
        <div style={{padding:"6px",borderRadius:"6px",background:"#180c0c",border:"1px solid #4a2222",textAlign:"center"}}>
          <div style={{fontSize:"13px",color:"#a66",fontFamily:"'Cinzel',serif",letterSpacing:".05em"}}>OUT · Loser {k}</div>
          <div style={{fontSize:"13px",color:l?"#d88":"#3a2020",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{l||"-"}</div>
        </div>
      </div>; };
    const pl=t.placements||{};
    return <div style={wrap} className="fu">
      <div style={{...box,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"18px",fontWeight:600}}>Triangle bracket</div><div style={{fontSize:"15px",color:C.muted}}>{t.phase==="done"?"Complete":"Top 8 from Swiss · tap a name to report"}</div></div>
        {isAdmin&&<button className="btn" onClick={reset} style={{padding:"9px 12px",background:"transparent",border:"1px solid #5a2a2a",borderRadius:"8px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"13px"}}>Reset</button>}
      </div>
      <div style={{...box,overflowX:"auto",paddingBottom:"14px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,minmax(140px,1fr))",gridTemplateRows:"repeat(5,auto)",gap:"9px 12px",minWidth:"760px"}}>
          {["A1","A2","A3","A4","B1","B2","B3","C1","C2","D1"].map(matchBox)}
          {["A1","B1","C1","D1"].map(winBox)}
          {["A4","B3","C2","D1"].map(loseBox)}
        </div>
      </div>
      {t.phase==="done"&&<div style={box}>
        <div style={{...sLbl,marginBottom:"10px"}}>Final placements · Aphrodite Points</div>
        {[1,2,3,4].map(k=>(<div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #c8a96e10"}}>
          <span style={{fontSize:"16px",color:C.text}}><strong style={{color:C.gold}}>{k}.</strong> {pl[k]||"-"}</span>
          <span style={{fontSize:"15px",color:C.muted,fontFamily:"'Cinzel',serif"}}>+{({1:5,2:3,3:2,4:1})[k]} AP</span>
        </div>))}
        {isAdmin&&(t.awarded
          ? <div style={{marginTop:"10px",fontSize:"15px",color:"#6ac68a",fontFamily:"'Cinzel',serif",textAlign:"center"}}>Aphrodite Points awarded</div>
          : <button className="btn" onClick={awardAP} style={{width:"100%",marginTop:"12px",padding:"11px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"9px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"16px",fontWeight:900}}>Award Aphrodite Points (5/3/2/1)</button>)}
        {isAdmin&&<div style={{fontSize:"13px",color:"#5a5347",marginTop:"8px",textAlign:"center"}}>Verify placements 2-4 match your bracket before awarding.</div>}
      </div>}
    </div>;
  }

  // swiss
  const cur=rounds[t.round-1]||{matches:[]};
  const allDone=cur.matches.every(m=>m.confirmed);
  const bl={winners:"",lb1:"",lb2:"",eliminated:""};
  return <div style={wrap} className="fu">
    <div style={{...box,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"18px",fontWeight:600}}>Swiss</div><div style={{fontSize:"15px",color:C.muted}}>Round {t.round} of {t.totalRounds}</div></div>
      {isAdmin&&<div style={{display:"flex",gap:"7px"}}>
        {t.round<t.totalRounds
          ? <button className="btn" disabled={!allDone} onClick={nextRound} style={{padding:"9px 15px",background:allDone?"linear-gradient(135deg,#c8a96e,#9a7440)":"#111",border:"none",borderRadius:"8px",color:allDone?C.bg:C.faint,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:700}}>Next round</button>
          : (allDone?<button className="btn" onClick={startTriangle} style={{padding:"9px 15px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"8px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:900}}>Start Triangle</button>:<span style={{fontSize:"15px",color:C.muted,fontFamily:"'Cinzel',serif",alignSelf:"center"}}>Finish all matches</span>)}
        <button className="btn" onClick={reset} style={{padding:"9px 12px",background:"transparent",border:"1px solid #5a2a2a",borderRadius:"8px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"13px"}}>Reset</button>
      </div>}
    </div>

    <div style={box}>
      <div style={{...sLbl,marginBottom:"10px"}}>Round {t.round} matches</div>
      {cur.matches.map((m,mi)=>{
        const mine=me&&(m.a===me||m.b===me);
        if(m.bye) return <div key={mi} style={{padding:"9px 0",borderBottom:"1px solid #c8a96e10",fontSize:"16px",color:C.muted}}><strong style={{color:C.text}}>{m.a}</strong> has a bye (free win)</div>;
        const rep=m.report;
        return (
          <div key={mi} style={{padding:"10px 0",borderBottom:"1px solid #c8a96e10"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>
              <div style={{fontSize:"17px",color:C.text}}><strong style={{color:m.confirmed&&m.winner===m.a?"#6ac68a":C.text}}>{m.a}</strong> <span style={{color:C.muted,fontSize:"15px"}}>vs</span> <strong style={{color:m.confirmed&&m.winner===m.b?"#6ac68a":C.text}}>{m.b}</strong></div>
              {m.confirmed
                ? <span style={{fontSize:"15px",color:"#6ac68a",fontFamily:"'Cinzel',serif"}}>{m.winner} won{isAdmin?" ":""}</span>
                : rep? <span style={{fontSize:"14px",color:"#e0b040",fontFamily:"'Cinzel',serif"}}>pending: {rep.winner} won</span>
                : <span style={{fontSize:"14px",color:C.muted}}>not reported</span>}
            </div>
            {mine&&!m.confirmed&&<div style={{display:"flex",gap:"7px",marginTop:"8px"}}>
              <button className="btn" onClick={()=>report(t.round-1,mi,me)} style={{flex:1,padding:"8px",background:rep&&rep.winner===me?"#0d1a12":"#0d0f18",border:"1px solid "+(rep&&rep.winner===me?"#2a5a3a":"#333"),borderRadius:"7px",color:rep&&rep.winner===me?"#6ac68a":C.text,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>I won</button>
              <button className="btn" onClick={()=>report(t.round-1,mi,m.a===me?m.b:m.a)} style={{flex:1,padding:"8px",background:"#0d0f18",border:"1px solid #333",borderRadius:"7px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>I lost</button>
            </div>}
            {isAdmin&&!m.confirmed&&<div style={{display:"flex",gap:"6px",marginTop:"8px"}}>
              {rep&&<button className="btn" onClick={()=>confirmMatch(t.round-1,mi)} style={{padding:"6px 12px",background:"#1a3a1a",border:"1px solid #3a6a3a",borderRadius:"6px",color:"#8c8",fontFamily:"'Cinzel',serif",fontSize:"13px"}}>Confirm {rep.winner}</button>}
              <button className="btn" onClick={()=>setWinner(t.round-1,mi,m.a)} style={{padding:"6px 10px",background:"transparent",border:"1px solid #444",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"13px"}}>{m.a} won</button>
              <button className="btn" onClick={()=>setWinner(t.round-1,mi,m.b)} style={{padding:"6px 10px",background:"transparent",border:"1px solid #444",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"13px"}}>{m.b} won</button>
            </div>}
            {isAdmin&&m.confirmed&&!m.bye&&<button className="btn" onClick={()=>undo(t.round-1,mi)} style={{marginTop:"6px",padding:"4px 10px",background:"transparent",border:"1px solid #4a2222",borderRadius:"6px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"13px"}}>undo</button>}
          </div>
        );
      })}
    </div>

    <div style={box}>
      <div style={{...sLbl,marginBottom:"10px"}}>Standings</div>
      {stand.map((n,i)=>(
        <div key={n} style={{display:"flex",alignItems:"center",gap:"10px",padding:"6px 0",borderBottom:"1px solid #c8a96e10"}}>
          <span style={{width:"20px",fontFamily:"'Cinzel',serif",color:i<8?C.gold:"#3a3a3a",fontSize:"16px",fontWeight:900}}>{i+1}</span>
          <span style={{flex:1,fontSize:"16px",color:n===me?C.gold:C.text}}>{n}{data.users[n]&&data.users[n].riotId?<span style={{color:C.muted,fontSize:"13px"}}> · {data.users[n].riotId}</span>:null}</span>
          {(()=>{const uu=data.users[n]||{};const url=deckUrl(uu.deck);return url?<a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:"13px",color:"#5599cc",textDecoration:"none",fontFamily:"'Cinzel',serif"}}>deck ↗</a>:null;})()}
          <span style={{fontSize:"15px",color:C.muted,fontFamily:"'Cinzel',serif"}}>{rec[n].w}-{rec[n].l}</span>
        </div>
      ))}
      <div style={{fontSize:"13px",color:"#5a5347",marginTop:"8px"}}>Top 8 advance to the Triangle bracket.</div>
    </div>
  </div>;
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [data,setData]=useState(null);
  const [me,setMe]=useState(()=>{ try{return sessionStorage.getItem("at_me")||null;}catch(e){return null;} });
  const [spectator,setSpectator]=useState(false);
  const [db,setDb]=useState(null);
  const [starters,setStarters]=useState(null);

  useEffect(()=>{
    Promise.all([fetch("./cards.json").then(r=>r.json()), fetch("./starter.json").then(r=>r.json())])
      .then(([cards,st])=>{ setDb(buildDB(cards)); setStarters(st); })
      .catch(e=>console.error("card data load failed:",e));
  },[]);

  useEffect(()=>{
    if(!CONFIG_OK) return;
    const cb = stateRef.on("value", snap=>{
      const val=snap.val();
      if(val===null){ stateRef.set(SEED); return; }
      if(!val.testSeeded){
        const nu=JSON.parse(JSON.stringify(val)); if(!nu.users) nu.users={};
        for(let i=1;i<=8;i++){ const n="Test"+i; if(!nu.users[n]) nu.users[n]=freshTest(); }
        nu.testSeeded=true; stateRef.set(nu); return;
      }
      setData(val);
    }, err=>{ console.error("Firebase:",err); });
    return ()=>stateRef.off("value", cb);
  },[]);

  function mutate(fn){
    setData(prev=>{
      const next=fn(JSON.parse(JSON.stringify(prev||SEED)));
      if(stateRef) stateRef.set(next);
      return next;
    });
  }
  function login(n){ setMe(n); try{sessionStorage.setItem("at_me",n);}catch(e){} }
  function register(n){ mutate(d=>{ if(!d.pending)d.pending={}; d.pending[n]={password:genPw(),ts:Date.now()}; return d; }); }
  function logout(){ setMe(null); setSpectator(false); try{sessionStorage.removeItem("at_me");}catch(e){} }

  if(!CONFIG_OK) return <SetupScreen/>;
  if(!data) return <Loading/>;
  if(spectator) return <Spectator data={data} onLeave={()=>setSpectator(false)}/>;
  if(!me || !(data.users && data.users[me])) {
    // not logged in (or account no longer exists) → login
    return <Login data={data} onLogin={login} onSpectator={()=>setSpectator(true)} onRegister={register}/>;
  }

  const role=data.users[me].role;
  return (
    <div style={{minHeight:"100vh"}}>
      <TopBar me={me} role={role} coins={data.users[me].coins} onLogout={logout}/>
      {role==="admin" ? <AdminHome data={data} mutate={mutate} me={me}/> : (db&&starters ? <PlayerHome data={data} me={me} db={db} starters={starters} mutate={mutate}/> : <Loading/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
