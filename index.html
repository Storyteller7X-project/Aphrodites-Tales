<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aphrodite's Tales</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%8F%9B%EF%B8%8F%3C/text%3E%3C/svg%3E"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060810;color:#e8d5b0;font-family:'Crimson Pro',Georgia,serif;font-size:16px}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-thumb{background:#c8a96e44;border-radius:3px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glow{0%,100%{text-shadow:0 0 20px #c8a96e55}50%{text-shadow:0 0 44px #c8a96ecc}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .fu{animation:fadeUp .35s ease forwards}
  .glow{animation:glow 3s ease infinite}
  .spin{animation:spin 1.2s linear infinite}
  .btn{transition:transform .1s;cursor:pointer}
  .btn:active{transform:scale(.97)}
  .btn:disabled{cursor:not-allowed;opacity:.35}
  input{outline:none}
  a{color:#5599cc}
</style>
<!-- Firebase (Realtime Database) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<!-- React + Babel (no build step) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ============================================================
   FIREBASE CONFIG  —  PASTE YOUR OWN VALUES BELOW
   Firebase console → Project settings → "Your apps" (Web) → SDK config.
   You must also enable Realtime Database (start in test mode).
   databaseURL must be the Realtime Database URL, e.g.
   https://YOUR-PROJECT-default-rtdb.europe-west1.firebasedatabase.app
   ============================================================ */
const firebaseConfig = {
  apiKey:      "AIzaSyDzWQ3n8iSUz11SMX_ch1cP24Dj0iNuBhI",
  authDomain:  "aphrodites-tales.firebaseapp.com",
  // databaseURL appears only AFTER you create the Realtime Database.
  // This is the europe-west1 URL. If Firebase shows a different one when you
  // create the DB, replace this line with that exact URL.
  databaseURL: "https://aphrodites-tales-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:   "aphrodites-tales",
  storageBucket: "aphrodites-tales.firebasestorage.app",
  messagingSenderId: "154662114761",
  appId:       "1:154662114761:web:0601d2730bec3582c14418",
};

const CONFIG_OK =
  firebaseConfig.apiKey && firebaseConfig.apiKey !== "PASTE_HERE" &&
  firebaseConfig.databaseURL && firebaseConfig.databaseURL.indexOf("http") === 0;

let db = null, stateRef = null;
if (CONFIG_OK) {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  stateRef = db.ref("state");
}

/* ---------- theme ---------- */
const C = {bg:"#060810",surface:"#0d0f18",dim:"#0a0c14",gold:"#c8a96e",text:"#e8d5b0",muted:"#7c715b",faint:"#3a3a3a"};
const sCard={background:C.surface,border:"1px solid #c8a96e28",borderRadius:"12px",padding:"18px"};
const sLbl={fontFamily:"'Cinzel',serif",fontSize:"11px",color:C.muted,letterSpacing:".1em",textTransform:"uppercase"};
const sInp={width:"100%",background:C.bg,border:"1px solid #c8a96e44",borderRadius:"8px",padding:"10px 14px",color:C.text,fontFamily:"'Crimson Pro',serif",fontSize:"17px"};
const wrap={display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"40px 20px",background:"radial-gradient(ellipse at 50% -10%,#1a1200,#060810 55%)"};

/* ---------- helpers ---------- */
function genPw(){const d="23456789",l="abcdefghjkmnpqrstuvwxyz";const r=a=>a[Math.floor(Math.random()*a.length)];return r(d)+r(l)+r(d)+r(l);}

/* ---------- data model (shared, in Firebase) ---------- */
function freshAdmin(){ return {password:"5r2w",role:"admin",coins:0,deck:null,starter:null,riotId:"",discordId:"",aphro:0}; }
function freshPlayer(pw){ return {password:pw,role:"player",coins:100,deck:null,starter:null,riotId:"",discordId:"",aphro:0}; }

const SEED = {
  users: { Storyteller: freshAdmin() },
  pending: {},
  season: 1,
  week: 1,
  prepEnded: false,     // false = Prep Time (players can edit), true = locked for matchday
  champion: null,
  tournament: { started:false },
};

/* ============================================================
   SETUP SCREEN (shown until you paste your Firebase config)
   ============================================================ */
function SetupScreen(){
  const steps = [
    ["Create a Firebase project", "console.firebase.google.com → Add project (any name, e.g. aphrodites-tales). You can skip Google Analytics."],
    ["Add a Web app", "In the project, click the </> (Web) icon → register an app → you'll get a firebaseConfig object."],
    ["Enable Realtime Database", "Left menu → Build → Realtime Database → Create Database → pick a location (europe-west1) → start in test mode."],
    ["Paste the config", "Open this index.html, find the firebaseConfig block near the top, and paste your values (apiKey, databaseURL, etc.). Save & reload."],
  ];
  return (
    <div style={wrap}>
      <div className="fu" style={{...sCard,maxWidth:"560px",width:"100%",borderColor:"#c8a96e55"}}>
        <div className="glow" style={{fontFamily:"'Cinzel',serif",fontSize:"22px",fontWeight:900,color:C.gold,letterSpacing:".1em",textAlign:"center",marginBottom:"6px"}}>APHRODITE'S TALES</div>
        <div style={{textAlign:"center",color:C.muted,fontSize:"13px",marginBottom:"18px"}}>Firebase setup required</div>
        {steps.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:"12px",marginBottom:"14px"}}>
            <div style={{flexShrink:0,width:"26px",height:"26px",borderRadius:"50%",background:"#c8a96e18",border:"1px solid #c8a96e55",color:C.gold,fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",color:C.text,fontSize:"14px",fontWeight:600,marginBottom:"3px"}}>{s[0]}</div>
              <div style={{fontSize:"13px",color:"#9c917b",lineHeight:1.6}}>{s[1]}</div>
            </div>
          </div>
        ))}
        <div style={{marginTop:"6px",padding:"12px 14px",background:C.dim,borderRadius:"8px",border:"1px solid #c8a96e22",fontSize:"12.5px",color:"#9c917b",lineHeight:1.6}}>
          Once connected, this same file works on every device and phone at once. Send me the config if you'd rather I plug it in.
        </div>
      </div>
    </div>
  );
}

function Loading(){
  return (
    <div style={{...wrap,gap:"16px"}}>
      <div className="spin" style={{width:"44px",height:"44px",borderRadius:"50%",border:"3px solid #c8a96e33",borderTopColor:C.gold}}/>
      <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"13px",letterSpacing:".1em"}}>Connecting to the archive</div>
    </div>
  );
}

/* ============================================================
   LOGIN / REGISTER
   ============================================================ */
function Login({data,onLogin,onSpectator,onRegister}){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);

  function doLogin(){
    const n=name.trim();
    if(!n){setErr("Enter a username.");return;}
    if(n==="Spectator"){onSpectator();return;}
    const u=data.users&&data.users[n];
    if(!u){ setErr("Account not found."); return; }
    if(u.password!==pw){ setErr("Incorrect password."); return; }
    onLogin(n);
  }
  function doReg(){
    const n=name.trim();
    if(!n){setErr("Enter your Discord username.");return;}
    if(n==="Spectator"){setErr("Reserved name.");return;}
    if((data.users&&data.users[n])||(data.pending&&data.pending[n])){setErr("Name already taken or pending.");return;}
    onRegister(n);
    setDone(true);
  }

  if(done) return (
    <div style={wrap}>
      <div className="fu" style={{...sCard,maxWidth:"420px",width:"100%",textAlign:"center",borderColor:"#c8a96e55"}}>
        <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"15px",fontWeight:600,marginBottom:"10px"}}>Registration submitted</div>
        <div style={{fontSize:"13px",color:"#aaa",lineHeight:1.7}}>Your account <strong style={{color:C.text}}>{name.trim()}</strong> is pending. An admin will approve you and DM your password on Discord.</div>
        <button className="btn" onClick={()=>{setDone(false);setMode("login");setName("");}} style={{marginTop:"18px",padding:"9px 22px",background:"#c8a96e18",border:"1px solid #c8a96e44",borderRadius:"8px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:"12px"}}>Back to login</button>
      </div>
    </div>
  );

  return (
    <div style={wrap}>
      <div className="glow" style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,5vw,40px)",fontWeight:900,color:C.gold,textAlign:"center",letterSpacing:".12em",marginBottom:"6px"}}>APHRODITE'S TALES</div>
      <div style={{...sLbl,marginBottom:"30px",letterSpacing:".3em",textAlign:"center"}}>Powered by Storyteller</div>
      <div className="fu" style={{width:"100%",maxWidth:"400px",display:"flex",flexDirection:"column",gap:"13px"}}>
        {mode==="login" ? (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Login</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Username" style={{...sInp,marginBottom:"8px"}}/>
              <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" type="password" style={sInp} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"13px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doLogin} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:900,letterSpacing:".15em"}}>ENTER</button>
            <div style={{padding:"13px",background:"#c8a96e08",border:"1px solid #c8a96e15",borderRadius:"10px",textAlign:"center"}}>
              <div style={{fontSize:"12px",color:C.muted,marginBottom:"9px"}}>Enter <strong style={{color:"#888"}}>Spectator</strong> as the username to watch (no password).</div>
              <button className="btn" onClick={()=>{setMode("register");setErr("");}} style={{padding:"5px 14px",background:"transparent",border:"1px solid #c8a96e33",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Register new account →</button>
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Register</div>
              <div style={{fontSize:"13px",color:C.muted,marginBottom:"12px",lineHeight:1.6}}>Enter your Discord username. An admin will approve you and DM your password.</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Discord username" style={sInp}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"13px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doReg} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:900,letterSpacing:".15em"}}>SUBMIT REGISTRATION</button>
            <button className="btn" onClick={()=>{setMode("login");setErr("");}} style={{padding:"10px",background:"transparent",border:"1px solid #333",borderRadius:"8px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"12px"}}>← Back</button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   TOP BAR
   ============================================================ */
function TopBar({me,role,coins,onLogout}){
  return (
    <div style={{background:"#090b13",borderBottom:"1px solid #c8a96e1a",padding:"10px 18px",position:"sticky",top:0,zIndex:50,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"13px",fontWeight:900,color:C.gold,letterSpacing:".1em"}}>APHRODITE'S TALES</div>
        <div style={{fontSize:"11px",color:C.muted,marginTop:"1px"}}>{me}{role==="admin"?" · Admin":""}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {role!=="admin" && <div style={{display:"flex",alignItems:"center",gap:"6px",background:"#c8a96e15",border:"1px solid #c8a96e44",borderRadius:"20px",padding:"4px 13px",fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"14px",fontWeight:600}}>{coins||0} coins</div>}
        <button className="btn" onClick={onLogout} style={{padding:"5px 10px",background:"transparent",border:"1px solid #333",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Logout</button>
      </div>
    </div>
  );
}

/* ============================================================
   ADMIN HOME (foundation: approvals + roster + prep phase)
   ============================================================ */
function AdminHome({data,mutate}){
  const [msg,setMsg]=useState("");
  const pending=Object.keys(data.pending||{});
  const players=Object.keys(data.users||{}).filter(n=>data.users[n].role==="player");

  function approve(n){
    mutate(d=>{ const p=d.pending&&d.pending[n]; if(!p)return d; d.users[n]=freshPlayer(p.password); delete d.pending[n]; return d; });
    setMsg(n+" approved.");
  }
  function deny(n){ mutate(d=>{ if(d.pending) delete d.pending[n]; return d; }); }
  function togglePrep(){
    mutate(d=>{ d.prepEnded=!d.prepEnded; return d; });
  }
  function newWeek(){
    mutate(d=>{ d.week=(d.week||1)+1; d.prepEnded=false; const us=d.users||{}; Object.keys(us).forEach(n=>{ if(us[n].role==="player") us[n].coins=(us[n].coins||0)+100; }); return d; });
    setMsg("New week started. +100 coins to all players.");
  }

  return (
    <div style={{padding:"14px 18px",maxWidth:"640px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}} className="fu">
      <div style={sCard}>
        <div style={{...sLbl,marginBottom:"6px"}}>Season {data.season||1} · Week {data.week||1}</div>
        <div style={{fontSize:"12px",color:C.muted,marginBottom:"10px",lineHeight:1.6}}>
          {data.prepEnded ? "Decks are LOCKED for the matchday. Players cannot edit until you start the next week." : "Prep Time is OPEN. Players can buy, open packs, and remove cards."}
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          <button className="btn" onClick={togglePrep} style={{flex:1,minWidth:"150px",padding:"9px",background:data.prepEnded?"#1a1400":"#0d1a2a",border:"1px solid "+(data.prepEnded?"#c8a96e55":"#334466"),borderRadius:"8px",color:data.prepEnded?C.gold:"#5599cc",fontFamily:"'Cinzel',serif",fontSize:"12px",fontWeight:600}}>{data.prepEnded?"Reopen Prep Time":"End Prep Time"}</button>
          <button className="btn" onClick={newWeek} style={{flex:1,minWidth:"150px",padding:"9px",background:"#0d1a12",border:"1px solid #2a5a3a",borderRadius:"8px",color:"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"12px",fontWeight:600}}>Start next week (+100 all)</button>
        </div>
      </div>

      <div style={sCard}>
        <div style={{...sLbl,marginBottom:"10px"}}>Registrations ({pending.length})</div>
        {pending.length===0 && <div style={{fontSize:"13px",color:C.muted}}>No pending registrations.</div>}
        {pending.map(n=>(
          <div key={n} style={{display:"flex",alignItems:"center",gap:"12px",padding:"9px 0",borderBottom:"1px solid #c8a96e10"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"14px",color:C.text,fontWeight:600}}>{n}</div>
              <div style={{fontFamily:"monospace",fontSize:"18px",color:C.gold,letterSpacing:".1em"}}>{data.pending[n].password}</div>
            </div>
            <button className="btn" onClick={()=>approve(n)} style={{padding:"6px 12px",background:"#1a3a1a",border:"1px solid #3a6a3a",borderRadius:"6px",color:"#6c6",fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Approve</button>
            <button className="btn" onClick={()=>deny(n)} style={{padding:"6px 12px",background:"#1a0a0a",border:"1px solid #4a2222",borderRadius:"6px",color:"#c66",fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Deny</button>
          </div>
        ))}
      </div>

      <div style={sCard}>
        <div style={{...sLbl,marginBottom:"10px"}}>Players ({players.length})</div>
        {players.length===0 && <div style={{fontSize:"13px",color:C.muted}}>No players yet.</div>}
        {players.map(n=>{
          const u=data.users[n];
          return (
            <div key={n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #c8a96e10"}}>
              <div style={{fontSize:"13px",color:C.text}}>{n}</div>
              <div style={{fontSize:"12px",color:C.muted}}>pw: {u.password} · {u.coins||0} coins · {u.starter?("deck: "+u.starter):"no deck yet"}</div>
            </div>
          );
        })}
      </div>

      {msg && <div style={{padding:"10px 14px",background:"#0a1a0a",border:"1px solid #3a6a3a",borderRadius:"8px",color:"#8c8",fontSize:"13px",fontFamily:"'Cinzel',serif"}}>{msg}</div>}

      <div style={{...sCard,borderStyle:"dashed",borderColor:"#c8a96e1a",textAlign:"center"}}>
        <div style={{fontSize:"12px",color:C.muted,lineHeight:1.6}}>Foundation online. Deck / shop / packs / removal and the Swiss → Triangle bracket + check-in are being ported onto this Firebase base next.</div>
      </div>
    </div>
  );
}

/* ============================================================
   PLAYER HOME (foundation)
   ============================================================ */
function PlayerHome({data,me}){
  const u=data.users[me]||{};
  return (
    <div style={{padding:"14px 18px",maxWidth:"640px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}} className="fu">
      <div style={{...sCard,textAlign:"center",borderColor:"#c8a96e44"}}>
        <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"16px",fontWeight:600,marginBottom:"6px"}}>Welcome, {me}</div>
        <div style={{fontSize:"13px",color:"#aaa",lineHeight:1.7}}>You're connected to the shared archive. You have <strong style={{color:C.gold}}>{u.coins||0} coins</strong>.</div>
        <div style={{marginTop:"10px",fontSize:"12px",color:C.muted}}>{data.prepEnded ? "Decks are locked for the matchday." : "Prep Time is open."}</div>
      </div>
      <div style={{...sCard,borderStyle:"dashed",borderColor:"#c8a96e1a",textAlign:"center"}}>
        <div style={{fontSize:"13px",color:C.muted,lineHeight:1.7}}>Deck selection, shop, packs, card removal and the bracket are being ported onto this new Firebase version. This same account and deck will now follow you on every device.</div>
      </div>
    </div>
  );
}

/* ============================================================
   SPECTATOR (foundation)
   ============================================================ */
function Spectator({data,onLeave}){
  const players=Object.keys(data.users||{}).filter(n=>data.users[n].role==="player");
  return (
    <div style={{minHeight:"100vh"}}>
      <div style={{background:"#090b13",borderBottom:"1px solid #c8a96e1a",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"13px",fontWeight:900,color:C.gold,letterSpacing:".1em"}}>APHRODITE'S TALES</div>
        <button className="btn" onClick={onLeave} style={{padding:"5px 10px",background:"transparent",border:"1px solid #333",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Leave</button>
      </div>
      <div style={{padding:"14px 18px",maxWidth:"640px",margin:"0 auto"}} className="fu">
        <div style={{...sLbl,marginBottom:"10px"}}>Competitors ({players.length})</div>
        {players.length===0 && <div style={{...sCard,textAlign:"center",color:C.muted,fontSize:"13px"}}>No players yet.</div>}
        {players.map(n=>(
          <div key={n} style={{...sCard,padding:"11px 14px",marginBottom:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:"13px",color:C.text}}>{n}</div>
            <div style={{fontSize:"12px",color:C.muted}}>{(data.users[n].aphro||0)} AP</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [data,setData]=useState(null);
  const [me,setMe]=useState(()=>{ try{return sessionStorage.getItem("at_me")||null;}catch(e){return null;} });
  const [spectator,setSpectator]=useState(false);

  useEffect(()=>{
    if(!CONFIG_OK) return;
    const cb = stateRef.on("value", snap=>{
      const val=snap.val();
      if(val===null){ stateRef.set(SEED); return; }
      setData(val);
    }, err=>{ console.error("Firebase:",err); });
    return ()=>stateRef.off("value", cb);
  },[]);

  function mutate(fn){
    setData(prev=>{
      const next=fn(JSON.parse(JSON.stringify(prev||SEED)));
      if(stateRef) stateRef.set(next);
      return next;
    });
  }
  function login(n){ setMe(n); try{sessionStorage.setItem("at_me",n);}catch(e){} }
  function register(n){ mutate(d=>{ if(!d.pending)d.pending={}; d.pending[n]={password:genPw(),ts:Date.now()}; return d; }); }
  function logout(){ setMe(null); setSpectator(false); try{sessionStorage.removeItem("at_me");}catch(e){} }

  if(!CONFIG_OK) return <SetupScreen/>;
  if(!data) return <Loading/>;
  if(spectator) return <Spectator data={data} onLeave={()=>setSpectator(false)}/>;
  if(!me || !(data.users && data.users[me])) {
    // not logged in (or account no longer exists) → login
    return <Login data={data} onLogin={login} onSpectator={()=>setSpectator(true)} onRegister={register}/>;
  }

  const role=data.users[me].role;
  return (
    <div style={{minHeight:"100vh"}}>
      <TopBar me={me} role={role} coins={data.users[me].coins} onLogout={logout}/>
      {role==="admin" ? <AdminHome data={data} mutate={mutate}/> : <PlayerHome data={data} me={me}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
