  @keyframes glowpulse{0%,100%{box-shadow:0 0 15px var(--gc)}50%{box-shadow:0 0 38px var(--gc)}}

  @keyframes pkfloat{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

  @keyframes pkorb{0%{opacity:0;transform:translate(-50%,-50%) scale(.12)}45%{opacity:.8}80%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}

/* ---------- helpers ---------- */
function genPw(){const d="23456789",l="abcdefghjkmnpqrstuvwxyz";const r=a=>a[Math.floor(Math.random()*a.length)];return r(d)+r(l)+r(d)+r(l);}
/* Passwords are never stored in plain text. PBKDF2-SHA256, salted per username. */
function bufToHex(b){ return Array.prototype.map.call(new Uint8Array(b),x=>("00"+x.toString(16)).slice(-2)).join(""); }
function subtleOK(){ return !!(window.crypto && window.crypto.subtle); }
async function pwHash(user,plain){
  if(!subtleOK()) throw new Error("no-subtle");
  const enc=new TextEncoder();
  const key=await window.crypto.subtle.importKey("raw",enc.encode(String(plain)),{name:"PBKDF2"},false,["deriveBits"]);
  const bits=await window.crypto.subtle.deriveBits({name:"PBKDF2",salt:enc.encode("aphrodites-tales:"+user),iterations:120000,hash:"SHA-256"},key,256);
  return "pbkdf2:"+bufToHex(bits);
}
function isHashed(s){ return typeof s==="string" && s.indexOf("pbkdf2:")===0; }
async function pwVerify(user,plain,stored){
  if(!stored) return false;
  if(!isHashed(stored)) return String(plain)===String(stored);
  try{ return (await pwHash(user,plain))===stored; }catch(e){ return false; }
}

/* ============================================================
   LOGIN / REGISTER
   ============================================================ */
function Login({data,onLogin,onSpectator,onRegister,onRequestReset}){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [pw,setPw]=useState("");
  const [riot,setRiot]=useState("");
  const [disc,setDisc]=useState("");
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);
  const [sent,setSent]=useState(false);

  async function doLogin(){
    const n=name.trim();
    if(!n){setErr("Enter a username.");return;}
    if(n==="Spectator"){onSpectator();return;}
    const u=data.users&&data.users[n];
    if(!u){ setErr("Account not found."); return; }
    if(!u.noPassword){
      const ok=await pwVerify(n,pw,u.password);
      if(!ok){ setErr("Incorrect password."); return; }
    }
    onLogin(n);
  }
  async function doReg(){
    const n=name.trim();
    if(!n){setErr("Choose a username.");return;}
    if(n==="Spectator"){setErr("That name is reserved.");return;}
    if(data.users&&data.users[n]){setErr("Username already taken.");return;}
    if(!pw){setErr("Choose a password.");return;}
    if(!riot.trim()){setErr("Enter your Riot ID.");return;}
    if(!disc.trim()){setErr("Enter your Discord ID.");return;}
    await onRegister(n,pw,riot.trim(),disc.trim());
    onLogin(n);
  }
  function doForgot(){ const n=name.trim(); if(!n){setErr("Enter your username.");return;} if(!data.users||!data.users[n]){setErr("No account with that username.");return;} onRequestReset(n); setSent(true); setErr(""); }

  return (
    <div style={wrap}>
      <div style={{textAlign:"center",marginBottom:"30px"}}>
        <div className="glow" style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(32px,7.5vw,60px)",fontWeight:900,letterSpacing:".14em",lineHeight:1,background:"linear-gradient(180deg,#f7e0a4,#c8a96e 54%,#8a6636)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>APHRODITE'S TALES</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",marginTop:"12px"}}>
          <span style={{height:"1px",width:"56px",background:"linear-gradient(90deg,transparent,#c8a96e99)"}}/>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:"15px",color:C.muted,letterSpacing:".3em"}}>POWERED BY STORYTELLER</span>
          <span style={{height:"1px",width:"56px",background:"linear-gradient(90deg,#c8a96e99,transparent)"}}/>
        </div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"15px",color:"#948a74",letterSpacing:".25em",marginTop:"7px"}}>v. 0.1.0</div>
      </div>
      <div className="fu" style={{width:"100%",maxWidth:"400px",display:"flex",flexDirection:"column",gap:"13px"}}>
        {mode==="login" ? (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Login</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Username" style={{...sInp,marginBottom:"8px"}}/>
              <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" type="password" style={sInp} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"18px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doLogin} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"21px",fontWeight:900,letterSpacing:".15em"}}>ENTER</button>
            <div style={{padding:"13px",background:"#c8a96e08",border:"1px solid #c8a96e15",borderRadius:"10px",textAlign:"center"}}>
              <div style={{fontSize:"17px",color:C.muted,marginBottom:"9px"}}>Enter <strong style={{color:"#a8a8a8"}}>Spectator</strong> as the username to watch (no password).</div>
              <button className="btn" onClick={()=>{setMode("register");setErr("");}} style={{padding:"5px 14px",background:"transparent",border:"1px solid #c8a96e33",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>Register new account →</button>
              <div><button className="btn" onClick={()=>{setMode("forgot");setErr("");setSent(false);}} style={{marginTop:"9px",padding:"3px 10px",background:"transparent",border:"none",color:"#7a94b0",fontFamily:"'Cinzel',serif",fontSize:"15px",textDecoration:"underline",cursor:"pointer"}}>Forgot password?</button></div>
            </div>
          </React.Fragment>
        ) : mode==="forgot" ? (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Forgot password</div>
              {sent
                ? <div style={{fontSize:"17px",color:"#6ac68a",lineHeight:1.6,fontFamily:"'Cinzel',serif",textAlign:"center",padding:"8px 0"}}>Request sent. An admin will reset your password and send you a new one.</div>
                : <React.Fragment>
                    <div style={{fontSize:"17px",color:C.muted,marginBottom:"12px",lineHeight:1.6}}>Enter your username. An admin will be notified and will reset your password for you.</div>
                    <input value={name} onChange={e=>setName(e.target.value)} placeholder="Username" style={sInp} onKeyDown={e=>e.key==="Enter"&&doForgot()}/>
                  </React.Fragment>}
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"18px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            {!sent && <button className="btn" onClick={doForgot} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"20px",fontWeight:900,letterSpacing:".06em"}}>Request password reset</button>}
            <button className="btn" onClick={()=>{setMode("login");setErr("");setSent(false);}} style={{padding:"10px",background:"transparent",border:"1px solid #333",borderRadius:"8px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"17px"}}>← Back</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Create account</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Username" style={{...sInp,marginBottom:"8px"}}/>
              <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" type="password" style={{...sInp,marginBottom:"8px"}}/>
              <input value={riot} onChange={e=>setRiot(e.target.value)} placeholder="Riot ID (Name#TAG)" style={{...sInp,marginBottom:"8px"}}/>
              <input value={disc} onChange={e=>setDisc(e.target.value)} placeholder="Discord ID" style={sInp} onKeyDown={e=>e.key==="Enter"&&doReg()}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"18px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doReg} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"21px",fontWeight:900,letterSpacing:".1em"}}>CREATE ACCOUNT</button>
            <button className="btn" onClick={()=>{setMode("login");setErr("");}} style={{padding:"10px",background:"transparent",border:"1px solid #333",borderRadius:"8px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"17px"}}>← Back</button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

        <div style={{fontSize:"16px",color:C.muted,marginBottom:"14px",lineHeight:1.6}}>Set a new password for <strong style={{color:C.text}}>{me}</strong>.</div>
        <input value={cur} onChange={e=>setCur(e.target.value)} placeholder="Current password" type="password" style={{...sInp,marginBottom:"8px"}}/>
        <input value={np} onChange={e=>setNp(e.target.value)} placeholder="New password" type="password" style={sInp} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        {msg && <div style={{marginTop:"11px",fontSize:"16px",textAlign:"center",fontFamily:"'Cinzel',serif",color:msg==="Password changed."?"#6ac68a":"#cc4444"}}>{msg}</div>}
        <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
          <button className="btn" onClick={submit} style={{flex:1,padding:"12px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"9px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"16px",fontWeight:900}}>Change password</button>
          <button className="btn" onClick={()=>setOpen(false)} style={{padding:"12px 18px",background:"transparent",border:"1px solid #333",borderRadius:"9px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>Cancel</button>
        </div>
      </div>
    </div>}
    </React.Fragment>
  );
}

    <button className="btn" disabled={!n} onClick={()=>{ if(n){onGive(n);setV("");} }} style={{padding:"6px 10px",background:n?"#2a205a22":"#0d0f18",border:"1px solid "+(n?"#8a6ac877":"#333"),borderRadius:"6px",color:n?"#b79ae8":"#555",fontFamily:"'Cinzel',serif",fontSize:"13px"}}>+AP</button>

function CoinGrant({onGive}){

function AdminHome({data,mutate,me,db}){
  const [atab,setAtab]=useState("home");
  const [msg,setMsg]=useState("");
  const [delArm,setDelArm]=useState("");
  const [seasonArm,setSeasonArm]=useState(false);
  const [shownPw,setShownPw]=useState(null);
  const pending=Object.keys(data.pending||{});
  const isFullAdmin=!!(data.users[me]&&data.users[me].role==="admin");
  const seasonPhase=data.seasonPhase||(data.prepEnded?"locked":"building");
  const players=Object.keys(data.users||{}).filter(n=>data.users[n].role==="player"||data.users[n].role==="mod");

  function setPhase(p){ mutate(d=>{ d.seasonPhase=p; d.prepEnded=(p!=="building"); if(p==="locked"){ const us=d.users||{}; Object.keys(us).forEach(function(n){ if(us[n].role==="player"&&us[n].deck&&us[n].deck.length){ logStat(d,"deckLocks",{a:n,wk:d.week||1,deck:encodeDeck(us[n].deck),size:deckTotal(us[n].deck),t:Date.now()}); } }); } return d; }); }
  function newWeek(){ mutate(d=>{ d.week=(d.week||1)+1; d.prepEnded=false; d.seasonPhase="building"; const us=d.users||{}; Object.keys(us).forEach(n=>{ if(us[n].role==="player") us[n].coins=(us[n].coins||0)+100; }); return d; }); setMsg("New week started. +100 coins to all players."); }
  function delPlayer(n){ if(n===OWNER){ setDelArm(""); setMsg("The "+OWNER+" account cannot be deleted."); return; } mutate(d=>{ if(d.users) delete d.users[n]; return d; }); setDelArm(""); setMsg(n+" deleted."); }
  function resetSeason(){ mutate(d=>{ const us=d.users||{}; Object.keys(us).forEach(function(n){ if(us[n].role==="player"){ us[n].starter=null; us[n].deck=null; us[n].coins=100; us[n].aphro=0; } }); d.season=(d.season||1)+1; d.week=1; d.prepEnded=false; d.seasonPhase="building"; d.tournament={phase:"idle"}; return d; }); setSeasonArm(false); setMsg("Season reset. All players are back to starter deck choice."); }
  function exportStats(){
    const X=window.XLSX; if(!X){ setMsg("Spreadsheet tool is still loading, try again in a moment."); return; }
    const S=data.stats||{}; const users=data.users||{}; const hist=data.history||[];
    const nm=code=>{ const c=(db&&db.by)?db.by[code]:null; return c?c[1]:code; };
    const dt=x=>x?new Date(x).toLocaleString("en-US",{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";
    const players=Object.keys(users).filter(n=>users[n].role==="player").sort();
    const wb=X.utils.book_new();
    const add=(name,aoa)=>{ X.utils.book_append_sheet(wb,X.utils.aoa_to_sheet(aoa),name); };
    const sum=[["Account","Starter","Packs opened","Cards picked","Cards skipped","Store buys","Removals bought","Cards removed","Check-ins","Best finish","Deck size","Coins","Aphrodite Points"]];
    players.forEach(n=>{ const pk=(S.packs||[]).filter(e=>e.a===n); const buys=(S.buys||[]).filter(e=>e.a===n); const rem=(S.removals||[]).filter(e=>e.a===n); const ci=(S.checkins||[]).filter(e=>e.a===n).length; const fins=[]; hist.forEach(h=>Object.keys(h.placements||{}).forEach(pl=>{ if(h.placements[pl]===n) fins.push(parseInt(pl,10)); })); const u=users[n]; sum.push([n,u.starter||"",pk.length,pk.filter(e=>e.pick).length,pk.reduce((s,e)=>s+((e.skip||[]).length),0),buys.length,rem.length,rem.reduce((s,e)=>s+(e.n||0),0),ci,fins.length?Math.min.apply(null,fins):"",deckTotal(u.deck||[]),u.coins||0,u.aphro||0]); });
    add("Summary",sum);
    const po=[["Account","Week","Region","Picked","Skipped cards","Date"]];
    (S.packs||[]).forEach(e=>po.push([e.a,e.wk,e.reg,e.pick?nm(e.pick):"(took nothing)",(e.skip||[]).map(nm).join(", "),dt(e.t)]));
    add("Pack Opens",po);
    const off={},pic={};
    (S.packs||[]).forEach(e=>{ const all=(e.pick?[e.pick]:[]).concat(e.skip||[]); all.forEach(c=>off[c]=(off[c]||0)+1); if(e.pick)pic[e.pick]=(pic[e.pick]||0)+1; });
    const pr=[["Card","Times offered","Times picked","Times skipped","Pick %"]];
    Object.keys(off).sort((a,b)=>off[b]-off[a]).forEach(c=>{ const o=off[c],p=pic[c]||0; pr.push([nm(c),o,p,o-p,(o?Math.round(p/o*100):0)+"%"]); });
    add("Card Pick Rate",pr);
    const sp=[["Account","Week","Card","Price","Date"]];
    (S.buys||[]).forEach(e=>sp.push([e.a,e.wk,nm(e.c),e.p,dt(e.t)])); add("Store Purchases",sp);
    const cr=[["Account","Week","Cards removed","Cost","Deck size before","Date"]];
    (S.removals||[]).forEach(e=>cr.push([e.a,e.wk,e.n,e.cost,e.before,dt(e.t)])); add("Card Removals",cr);
    const ck=[["Account","Week","Date"]]; (S.checkins||[]).forEach(e=>ck.push([e.a,e.wk,dt(e.t)])); add("Check-ins",ck);
    const wc={}; (S.checkins||[]).forEach(e=>wc[e.wk]=(wc[e.wk]||0)+1);
    const cw=[["Week","Check-ins"]]; Object.keys(wc).sort((a,b)=>Number(a)-Number(b)).forEach(w=>cw.push([Number(w),wc[w]])); add("Check-ins by Week",cw);
    const st=[["Account","Starter deck","Week","Date"]]; (S.starters||[]).forEach(e=>st.push([e.a,e.s,e.wk,dt(e.t)])); add("Starter Picks",st);
    const fi=[["Tournament","Date","Server","Champion","1st","2nd","3rd","4th"]];
    hist.forEach(h=>{ const p=h.placements||{}; fi.push([h.name||"",dt(h.date),h.server||"",h.champion||"",p[1]||"",p[2]||"",p[3]||"",p[4]||""]); }); add("Finishes",fi);
    const fa=[["Account","Tournament","Date","Placement"]];
    hist.forEach(h=>Object.keys(h.placements||{}).forEach(pl=>fa.push([h.placements[pl],h.name||"",dt(h.date),Number(pl)]))); add("Finishes by Account",fa);
    const dh=[["Account","Week","Deck size","Deck code","Link","Date"]];
    (S.deckLocks||[]).forEach(e=>dh.push([e.a,e.wk,e.size,e.deck,"https://runeterra.ar/decks/code/"+e.deck,dt(e.t)])); add("Deck History",dh);
    X.writeFile(wb,"aphrodites-tales-stats-"+new Date().toISOString().slice(0,10)+".xlsx");
  }
  function makeTests(){ mutate(d=>{ if(!d.users)d.users={}; for(let i=1;i<=8;i++){ d.users["Test"+i]=freshTest(); } d.testSeeded=true; return d; }); setMsg("8 test accounts ready (Test1-Test8, no password)."); }
  function grant(n,amt){ mutate(d=>{ if(d.users[n]) d.users[n].coins=Math.max(0,(d.users[n].coins||0)+amt); return d; }); }
  function apGrant(n,amt){ mutate(d=>{ if(d.users[n]) d.users[n].aphro=Math.max(0,(d.users[n].aphro||0)+amt); return d; }); }
  async function resetPw(n){ const ch="abcdefghjkmnpqrstuvwxyzABCDEFGHJKMNPQRSTUVWXYZ23456789"; let np=""; for(let i=0;i<10;i++) np+=ch[Math.floor(Math.random()*ch.length)]; const h=await pwHash(n,np); mutate(d=>{ if(d.users[n]){ d.users[n].password=h; d.users[n].noPassword=false; } if(d.pwRequests) delete d.pwRequests[n]; return d; }); setShownPw({n:n,pw:np}); }

  const tab=(t,label)=>(
    <button key={t} className="btn" onClick={()=>{setAtab(t);setMsg("");setDelArm("");}}
      style={{flex:1,padding:"9px 4px",background:atab===t?"#c8a96e18":"transparent",border:"1px solid "+(atab===t?"#c8a96e44":"transparent"),borderRadius:"7px",color:atab===t?C.gold:C.muted,fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600,letterSpacing:".04em"}}>{label}</button>
  );

  return (
    <div style={{padding:"14px 18px",maxWidth:"640px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}} className="fu">
      <div style={{display:"flex",gap:"3px",background:"#090b12",borderRadius:"10px",padding:"4px",border:"1px solid #c8a96e1a"}}>
        {tab("home","Home")}{tab("players","Accounts")}{tab("bracket","Bracket")}
      </div>

      {atab==="home" && (
        <React.Fragment>
          <div style={sCard}>
            <div style={{...sLbl,marginBottom:"6px"}}>Season {data.season||1} · Week {data.week||1}</div>
            <div style={{fontSize:"17px",color:C.muted,marginBottom:"12px",lineHeight:1.6}}>Current phase: <strong style={{color:C.gold}}>{seasonPhase==="building"?"Deck building":seasonPhase==="locked"?"Deck lock":"Matchday"}</strong>. {seasonPhase==="building"?"Players build decks (buy, packs, remove) and cannot see other players' decks yet.":seasonPhase==="locked"?"Decks are locked. Players can now view everyone's decks and wait for the tournament.":"Players play with their locked decks and can view all decks. No editing until you reopen deck building."}</div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}>
              {seasonPhase==="building" && <button className="btn" onClick={()=>setPhase("locked")} style={{flex:1,minWidth:"150px",padding:"9px",background:"#1a1400",border:"1px solid #c8a96e55",borderRadius:"8px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>Lock decks (start Deck lock)</button>}
              {seasonPhase==="locked" && <React.Fragment>
                <button className="btn" onClick={()=>setPhase("matchday")} style={{flex:1,minWidth:"140px",padding:"9px",background:"#0d1a12",border:"1px solid #2a5a3a",borderRadius:"8px",color:"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>Start matchday</button>
                <button className="btn" onClick={()=>setPhase("building")} style={{flex:1,minWidth:"140px",padding:"9px",background:"#0d1a2a",border:"1px solid #334466",borderRadius:"8px",color:"#5599cc",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>Back to deck building</button>
              </React.Fragment>}
              {seasonPhase==="matchday" && <button className="btn" onClick={()=>setPhase("building")} style={{flex:1,minWidth:"150px",padding:"9px",background:"#0d1a2a",border:"1px solid #334466",borderRadius:"8px",color:"#5599cc",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>Reopen deck building</button>}
            </div>
            <button className="btn" onClick={newWeek} style={{width:"100%",padding:"9px",background:"#0d1a12",border:"1px solid #2a5a3a",borderRadius:"8px",color:"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>Start next week (+100 all)</button>
            {isFullAdmin && <button className="btn" onClick={()=>seasonArm?resetSeason():setSeasonArm(true)} style={{width:"100%",marginTop:"10px",padding:"9px",background:seasonArm?"#3a1010":"transparent",border:"1px solid "+(seasonArm?"#a33":"#5a2a2a"),borderRadius:"8px",color:seasonArm?"#f88":"#a66",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>{seasonArm?"Confirm: reset season - clears every deck, back to starter choice":"Reset season (all players re-pick a starter deck)"}</button>}
          </div>
          <div style={sCard}>

            <div style={{fontSize:"15px",color:C.muted,marginBottom:"10px",lineHeight:1.5}}>Download a full spreadsheet: pack opens with picks/skips, card pick rates, store purchases, card removals, check-ins, starter picks, finishes and deck history per week.</div>
            <button className="btn" onClick={exportStats} style={{width:"100%",padding:"11px",background:"#0d1a12",border:"1px solid #2a5a3a",borderRadius:"8px",color:"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>Export statistics (.xlsx)</button>

            <div style={{...sLbl,marginBottom:"8px",color:"#e0b040"}}>Password reset requests ({Object.keys(data.pwRequests).length})</div>

                  <button className="btn" onClick={()=>mutate(d=>{if(d.pwRequests)delete d.pwRequests[rn];return d;})} style={{padding:"6px 10px",background:"transparent",border:"1px solid #333",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"14px"}}>dismiss</button>
                </div>

            {shownPw&&data.pwRequests[shownPw.n]===undefined&&Object.keys(data.pwRequests).indexOf(shownPw.n)<0&&<div style={{marginTop:"8px",fontSize:"15px",color:"#9cf"}}>New password for {shownPw.n}: <strong style={{fontFamily:"monospace",fontSize:"18px",color:"#cef"}}>{shownPw.pw}</strong> (send it to them)</div>}

                      <CoinGrant onGive={amt=>grant(n,amt)}/>

                      {delArm===n
                        ? <button className="btn" onClick={()=>delPlayer(n)} style={{flexShrink:0,padding:"6px 10px",background:"#3a1010",border:"1px solid #a33",borderRadius:"6px",color:"#f88",fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:700}}>Confirm</button>
                        : <button className="btn" onClick={()=>setDelArm(n)} style={{flexShrink:0,padding:"6px 10px",background:"transparent",border:"1px solid #5a2a2a",borderRadius:"6px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"15px"}}>Delete</button>}

            <button className="btn" onClick={makeTests} style={{width:"100%",padding:"9px",background:"#0d1a2a",border:"1px solid #334466",borderRadius:"8px",color:"#5599cc",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:600}}>Create / reset 8 test accounts</button>

/* ============================================================
   PLAYER HOME (foundation)
   ============================================================ */
function PlayerHome({data,me,db,starters,mutate}){
  const u=data.users[me]||{};
  const deck=u.deck||[];
  const locked=!!data.prepEnded;
  const canViewOthers=!!data.prepEnded;
  const seasonPhase=data.seasonPhase||(data.prepEnded?"locked":"building");
  const coins=u.coins||0;
  const [tab,setTab]=useState("deck");

  function pickStarter(name,deckArr){ mutate(d=>{ d.users[me].starter=name; d.users[me].deck=deckArr; logStat(d,"starters",{a:me,s:name,wk:d.week||1,t:Date.now()}); return d; }); }
  function buyCard(code,price){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<price||deckRuleBlock(db,uu.deck||[],code)) return d; uu.coins=(uu.coins||0)-price; uu.deck=addToDeck(uu.deck||[],code); logStat(d,"buys",{a:me,wk:d.week||1,c:code,p:price,t:Date.now()}); return d; }); }
  function removeCards(sel,cost){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<cost) return d; const before=deckTotal(uu.deck||[]); let cnt=0; Object.keys(sel).forEach(code=>cnt+=sel[code]); let dk=(uu.deck||[]).map(e=>({...e})); Object.keys(sel).forEach(code=>{ const e=dk.find(x=>x.code===code); if(e) e.count-=sel[code]; }); uu.deck=dk.filter(e=>e.count>0); uu.coins=(uu.coins||0)-cost; logStat(d,"removals",{a:me,wk:d.week||1,n:cnt,cost:cost,before:before,t:Date.now()}); return d; }); }
  function chargePack(){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<ECON.PACK_COST) return d; uu.coins=(uu.coins||0)-ECON.PACK_COST; return d; }); }
  function keepPack(code,reg,cards){ mutate(d=>{ const uu=d.users[me]; if(deckRuleBlock(db,uu.deck||[],code)) return d; uu.deck=addToDeck(uu.deck||[],code); logStat(d,"packs",{a:me,wk:d.week||1,reg:reg||"",pick:code,skip:(cards||[]).filter(c=>c!==code),t:Date.now()}); return d; }); }
  function skipPack(reg,cards){ mutate(d=>{ logStat(d,"packs",{a:me,wk:d.week||1,reg:reg||"",pick:null,skip:cards||[],t:Date.now()}); return d; }); }

  if(!u.starter || !deck.length) return <StarterSelect starters={starters} db={db} onPick={pickStarter}/>;

  const tb=(t,l)=>(<button key={t} className="btn" onClick={()=>setTab(t)} style={{flex:1,padding:"12px 4px",background:tab===t?"#c8a96e12":"transparent",border:"none",borderBottom:"2px solid "+(tab===t?C.gold:"transparent"),color:tab===t?C.gold:C.muted,fontFamily:"'Cinzel',serif",fontSize:"20px",fontWeight:600,letterSpacing:".04em"}}>{l}</button>);

  return (
    <div>

const REGCOL={Demacia:"#e3c44a",Freljord:"#62c4e8",Ionia:"#ef74b6",Noxus:"#d23b37","Piltover & Zaun":"#e58a26","Shadow Isles":"#2bb56e",Bilgewater:"#1fa8a8",Shurima:"#e0b133","Mount Targon":"#9a72d8","Bandle City":"#a9c24a"};
const RARCOL=["#8fa3b0","#5b8fd0","#b25fd6","#e0b040"];
const REGICON={Demacia:"demacia",Freljord:"freljord",Ionia:"ionia",Noxus:"noxus","Piltover & Zaun":"piltoverzaun","Shadow Isles":"shadowisles",Bilgewater:"bilgewater",Shurima:"shurima","Mount Targon":"targon","Bandle City":"bandlecity"};

const ECON={PACK_COST:1,DECK_FLOOR:10,DECK_MAX:100,MAX_COPIES:3,MAX_CHAMPS:20,PACK_SIZE:13};

function buildDB(cards){
  const by={}; cards.forEach(c=>{ by[c[0]]=c; });
  const pools={}, runeChamps={}; REGIONS.forEach(r=>{pools[r]=[];runeChamps[r]=[];});
  cards.forEach(c=>{ const regs=c[5]||[]; REGIONS.forEach(r=>{ if(regs.indexOf(r)>=0||regs.indexOf("Runeterra ("+r+")")>=0) pools[r].push(c[0]); if(c[4]===1&&regs.indexOf("Runeterra ("+r+")")>=0) runeChamps[r].push(c[1]); }); });
  return {list:cards, by, pools, runeChamps};
}
const cCode=c=>c[0], cName=c=>c[1], cMana=c=>c[2], cRar=c=>c[3], cChamp=c=>c[4]===1, cRegs=c=>c[5]||[], cCoin=c=>c[6], cImg=c=>c[8]||"";
function coinOf(db,code){ const c=db.by[code]; return c?cCoin(c):20; }
function isChampCode(db,code){ const c=db.by[code]; return !!c&&cChamp(c); }
function deckTotal(deck){ return (deck||[]).reduce((s,e)=>s+(e.count||0),0); }
function logStat(d,cat,entry){ if(!d.stats)d.stats={}; if(!d.stats[cat])d.stats[cat]=[]; d.stats[cat].push(entry); if(d.stats[cat].length>5000) d.stats[cat]=d.stats[cat].slice(-5000); }
function champCards(db,deck){ return (deck||[]).filter(e=>isChampCode(db,e.code)).reduce((s,e)=>s+(e.count||0),0); }
function copiesOf(deck,code){ const e=(deck||[]).find(x=>x.code===code); return e?e.count:0; }
function addToDeck(deck,code){ const d=(deck||[]).map(e=>({...e})); const e=d.find(x=>x.code===code); if(e)e.count++; else d.push({code,count:1}); return d; }
function deckRuleBlock(db,deck,code){
  if(deckTotal(deck)>=ECON.DECK_MAX) return "Deck full ("+ECON.DECK_MAX+")";
  if(copiesOf(deck,code)>=ECON.MAX_COPIES) return "Max "+ECON.MAX_COPIES+" copies";
  if(isChampCode(db,code)&&champCards(db,deck)>=ECON.MAX_CHAMPS) return "Max "+ECON.MAX_CHAMPS+" champion cards";
  return null;
}
function removalCost(n){ if(n>=100)return 1; if(n>=90)return 2; if(n>=80)return 5; if(n>=70)return 10; if(n>=60)return 20; if(n>=50)return 50; if(n>=40)return 100; if(n>=30)return 200; if(n>=20)return 500; if(n>=11)return 1000; return 0; }
const REMOVAL_TIERS=[[100,100,1],[90,99,2],[80,89,5],[70,79,10],[60,69,20],[50,59,50],[40,49,100],[30,39,200],[20,29,500],[11,19,1000]];
function removalBatch(n){ return Math.max(0,Math.min(10,n-ECON.DECK_FLOOR)); }
function rollPack(db,pool,deck){
  if(!pool||!pool.length) return [];
  let cand=pool.filter(code=>copiesOf(deck,code)<ECON.MAX_COPIES);
  const out=[];
  for(let i=0;i<ECON.PACK_SIZE && cand.length>0;i++){
    let total=0; for(let k=0;k<cand.length;k++) total+=1/coinOf(db,cand[k]);
    let r=Math.random()*total, idx=cand.length-1;
    for(let k=0;k<cand.length;k++){ r-=1/coinOf(db,cand[k]); if(r<=0){ idx=k; break; } }
    out.push(cand[idx]);
    cand.splice(idx,1);
  }
  out.sort((a,b)=>cMana(db.by[a])-cMana(db.by[b])||cName(db.by[a]).localeCompare(cName(db.by[b])));
  return out;
}

function DeckView({db,deck,locked,coins,onRemove}){
  const [sellMode,setSellMode]=useState(false);
  const [sel,setSel]=useState({});
  const total=deckTotal(deck), batch=removalBatch(total), cost=removalCost(total);
  const selTotal=Object.values(sel).reduce((a,b)=>a+b,0);
  const entries=(deck||[]).map(e=>({...e,card:db.by[e.code]})).filter(e=>e.card);
  entries.sort((a,b)=>cMana(a.card)-cMana(b.card)||cName(a.card).localeCompare(cName(b.card)));
  const champs=entries.filter(e=>cChamp(e.card)), cards=entries.filter(e=>!cChamp(e.card));

  function tapSell(code){
    const have=copiesOf(deck,code);
    setSel(prev=>{ const cur=prev[code]||0; const others=Object.values(prev).reduce((a,b)=>a+b,0)-cur;
      if(cur>=have){ const n={...prev}; delete n[code]; return n; }
      if(others+cur+1>batch) return prev;
      return {...prev,[code]:cur+1}; });
  }
  function confirm(){ if(selTotal<1||selTotal>batch||coins<cost) return; onRemove(sel,cost); setSellMode(false); setSel({}); }

  const group=(title,list)=>(
    <div style={{marginBottom:"14px"}}>
      <div style={{...sLbl,marginBottom:"8px"}}>{title}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
        {list.map(e=>{ const s=sel[e.code]||0;
          return <CardThumb key={e.code} card={e.card} w={72} onClick={sellMode?()=>tapSell(e.code):undefined} badge={e.count>1?("x"+e.count):undefined} dim={sellMode&&s>0} sub={sellMode&&s>0?("- "+s):undefined}/>; })}
      </div>
    </div>
  );

  return (
    <div style={{padding:"14px 18px",maxWidth:"760px",margin:"0 auto"}} className="fu">
      <div style={{...sCard,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",padding:"12px 16px"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"21px",fontWeight:600}}>{total} cards</div>
          <div style={{fontSize:"17px",color:C.muted}}>{champCards(db,deck)}/{ECON.MAX_CHAMPS} champion cards · min {ECON.DECK_FLOOR} · max {ECON.DECK_MAX}</div>
        </div>
        {locked
          ? <div style={{fontSize:"15px",color:"#a66",fontFamily:"'Cinzel',serif",textAlign:"right",maxWidth:"150px"}}>Locked for the matchday</div>
          : (!sellMode
              ? <button className="btn" disabled={batch<=0} onClick={()=>setSellMode(true)} style={{padding:"8px 14px",background:batch>0?"#2a1410":"#111",border:"1px solid "+(batch>0?"#cc664455":"#333"),borderRadius:"8px",color:batch>0?"#e8a488":C.faint,fontFamily:"'Cinzel',serif",fontSize:"17px"}}>Buy removal</button>
              : <button className="btn" onClick={()=>{setSellMode(false);setSel({});}} style={{padding:"8px 14px",background:"transparent",border:"1px solid #333",borderRadius:"8px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"17px"}}>Cancel</button>)}
      </div>
      {sellMode && (
        <div style={{...sCard,marginBottom:"12px",padding:"12px 16px",background:"#1a0f0a",borderColor:"#cc664433"}}>
          <div style={{fontSize:"17px",color:"#e8b9a8",lineHeight:1.6,marginBottom:"10px"}}><strong style={{color:"#ffd9c8"}}>Remove up to {batch} cards.</strong> You don't have to remove them all. It costs <strong style={{color:C.gold}}>{cost} coins</strong> no matter how many you remove. Tap a card to select it; tap again to add more copies.</div>
          <div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"14px",color:C.muted,marginBottom:"7px"}}>Cost by deck size (cards left in deck):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
              {REMOVAL_TIERS.map((tr,i)=>{ const active=total>=tr[0]&&total<=tr[1];
                return <div key={i} style={{fontSize:"14px",padding:"3px 10px",borderRadius:"12px",background:active?"#c8a96e26":"#0d0f18",border:"1px solid "+(active?"#c8a96ebb":"#2a2a2a"),color:active?C.gold:"#a89c86",fontWeight:active?700:400,whiteSpace:"nowrap"}}>{tr[0]===tr[1]?tr[0]:tr[0]+"-"+tr[1]}: {tr[2]}</div>;
              })}
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"10px"}}>
            <div style={{fontSize:"18px",color:C.text}}>Selected {selTotal}/{batch} · cost {cost}{coins<cost?" (not enough coins)":""}</div>
            <button className="btn" disabled={selTotal<1||coins<cost} onClick={confirm} style={{flexShrink:0,padding:"8px 16px",background:selTotal>=1&&coins>=cost?"linear-gradient(135deg,#cc6644,#aa4422)":"#111",border:"none",borderRadius:"8px",color:selTotal>=1&&coins>=cost?"#fff":C.faint,fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:700}}>Confirm ({selTotal})</button>

/* ============================================================
   TOURNAMENT (check-in + Swiss)
   ============================================================ */
function swissRounds(n){ return Math.max(1, Math.ceil(Math.log2(Math.max(2,n)))+1); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const x=a[i]; a[i]=a[j]; a[j]=x; } return a; }
function computeRecords(players,rounds){
  const rec={}; players.forEach(p=>rec[p]={w:0,l:0,opps:[],bye:false});
  (rounds||[]).forEach(rd=>(rd.matches||[]).forEach(m=>{ if(!m.confirmed) return;
    if(m.bye){ if(rec[m.a]){rec[m.a].w++; rec[m.a].bye=true;} return; }
    const w=m.winner, l=(m.a===w?m.b:m.a);
    if(rec[w])rec[w].w++; if(rec[l])rec[l].l++;
    if(rec[m.a])rec[m.a].opps.push(m.b); if(rec[m.b])rec[m.b].opps.push(m.a);
  }));
  return rec;
}
function buch(u,rec){ return (rec[u]&&rec[u].opps||[]).reduce((s,o)=>s+(rec[o]?rec[o].w:0),0); }
function solk(u,rec){ const os=(rec[u]&&rec[u].opps||[]).map(o=>rec[o]?rec[o].w:0); if(!os.length)return 0; const sum=os.reduce((a,b)=>a+b,0); return sum-Math.min.apply(null,os); }
function h2h(a,b,rounds){ let r=0; (rounds||[]).forEach(rd=>(rd.matches||[]).forEach(m=>{ if(!m.confirmed||m.bye)return; if((m.a===a&&m.b===b)||(m.a===b&&m.b===a)){ if(m.winner===a)r=1; else if(m.winner===b)r=-1; } })); return r; }
function standing(players,rec,rounds,tb){ tb=tb||{}; return players.slice().sort((x,y)=>(rec[y].w-rec[x].w)||(buch(y,rec)-buch(x,rec))||(solk(y,rec)-solk(x,rec))||(-h2h(x,y,rounds))||((tb[y]||0)-(tb[x]||0))||x.localeCompare(y)); }
function pairRound(sorted,rec){
  let pool=sorted.slice(); const matches=[];
  if(pool.length%2===1){ let bi=-1; for(let i=pool.length-1;i>=0;i--){ if(!rec[pool[i]].bye){bi=i;break;} } if(bi<0)bi=pool.length-1; const bye=pool.splice(bi,1)[0]; matches.push({a:bye,b:null,winner:bye,confirmed:true,bye:true,report:null}); }
  while(pool.length>1){ const a=pool.shift(); let idx=pool.findIndex(b=>!(rec[a].opps||[]).includes(b)); if(idx<0)idx=0; const b=pool.splice(idx,1)[0]; matches.push({a,b,winner:null,confirmed:false,report:null}); }
  return matches;
}
const TRI_DEPS={ B1:[["l","A1"],["w","A2"]], B2:[["l","A2"],["w","A3"]], B3:[["w","A4"],["l","A3"]], C1:[["l","B1"],["w","B2"]], C2:[["l","B2"],["w","B3"]], D1:[["l","C1"],["w","C2"]] };
const TRI_ROUNDS=[["A1","A2","A3","A4"],["B1","B2","B3"],["C1","C2"],["D1"]];
const TRI_POS={ A1:{r:1,c:4}, A2:{r:2,c:3}, A3:{r:3,c:2}, A4:{r:4,c:1}, B1:{r:2,c:4}, B2:{r:3,c:3}, B3:{r:4,c:2}, C1:{r:3,c:4}, C2:{r:4,c:3}, D1:{r:4,c:4} };
const TRI_WIN={ A1:{r:1,c:5}, B1:{r:2,c:5}, C1:{r:3,c:5}, D1:{r:4,c:5} };
const TRI_LOSE={ A4:{r:5,c:1}, B3:{r:5,c:2}, C2:{r:5,c:3}, D1:{r:5,c:4} };
function triRes(m,side){ if(!m||!m.confirmed)return null; return side==="w"?m.winner:(m.winner===m.a?m.b:m.a); }
function seedTri(S){
  const s=S.slice(0,8); while(s.length<8)s.push(null); const tri={};
  [["A1",0,1],["A2",2,3],["A3",4,5],["A4",6,7]].forEach(([k,i,j])=>tri[k]={a:s[i]||null,b:s[j]||null,winner:null,confirmed:false,report:null});
  ["B1","B2","B3","C1","C2","D1"].forEach(k=>tri[k]={a:null,b:null,winner:null,confirmed:false,report:null});
  ["A1","A2","A3","A4"].forEach(k=>{const m=tri[k]; if(m.a&&!m.b){m.winner=m.a;m.confirmed=true;} else if(!m.a&&m.b){m.winner=m.b;m.confirmed=true;} else if(!m.a&&!m.b){m.winner=null;m.confirmed=true;}});
  triRecompute(tri); return tri;
}
function triRecompute(tri){
  let ch=true;
  while(ch){ ch=false;
    for(const k in TRI_DEPS){ if(tri[k].confirmed)continue; const [d1,d2]=TRI_DEPS[k]; const s1=tri[d1[1]],s2=tri[d2[1]];
      if(s1.confirmed&&s2.confirmed){ const a=triRes(s1,d1[0]),b=triRes(s2,d2[0]); tri[k].a=a; tri[k].b=b;
        if(a&&!b){tri[k].winner=a;tri[k].confirmed=true;ch=true;} else if(!a&&b){tri[k].winner=b;tri[k].confirmed=true;ch=true;} else if(!a&&!b){tri[k].winner=null;tri[k].confirmed=true;ch=true;} }
      else { tri[k].a=null; tri[k].b=null; } } }
}
function triW(tri,k){ return tri[k]&&tri[k].confirmed?tri[k].winner:null; }
function triL(tri,k){ return triRes(tri[k],"l"); }
function triPlacements(tri){ return {1:triW(tri,"A1"),2:triW(tri,"B1"),3:triW(tri,"C1"),4:triW(tri,"D1")}; }
function archiveTournament(d){
  const tt=d.tournament; if(!tt||tt.archived) return;
  if(!d.history) d.history=[];
  const rc=computeRecords(tt.players||[],tt.rounds||[]);
  const ord=standing(tt.players||[],rc,tt.rounds||[]);
  const snap={ date:Date.now(), name:tt.name||"", server:tt.server||"", champion:tt.champion||null, placements:tt.placements||{}, standings: ord.map(function(u){ const uu=(d.users&&d.users[u])||{}; return {name:u, riotId:uu.riotId||"", w:rc[u].w, l:rc[u].l, deck:(uu.deck&&uu.deck.length)?encodeDeck(uu.deck):"" }; }) };
  d.history.unshift(snap);
  if(d.history.length>30) d.history=d.history.slice(0,30);
  tt.archived=true;
}
const F2ID={DE:0,FR:1,IO:2,NX:3,PZ:4,SI:5,BW:6,SH:7,MT:9,BC:10,RU:12};
const FAC_MINVER={DE:1,FR:1,IO:1,NX:1,PZ:1,SI:1,BW:2,MT:2,SH:3,BC:4,RU:5};
const B32A="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
function b32enc(bytes){ let bits=0,val=0,out=""; for(let i=0;i<bytes.length;i++){ val=((val<<8)|bytes[i]); bits+=8; while(bits>=5){ bits-=5; out+=B32A[(val>>>bits)&31]; } val=val&((1<<bits)-1); } if(bits>0){ out+=B32A[(val<<(5-bits))&31]; } return out; }
function encodeDeck(cards){
  if(!cards||!cards.length) return "";
  let ver=1; cards.forEach(c=>{ const v=FAC_MINVER[c.code.slice(2,4)]||1; if(v>ver)ver=v; });
  const out=[(1<<4)|ver];
  function wv(v){ v=v>>>0; while(true){ let b=v&0x7F; v=Math.floor(v/128); if(v){out.push(b|0x80);} else {out.push(b);break;} } }
  const P=cards.map(c=>({set:parseInt(c.code.slice(0,2),10),fac:c.code.slice(2,4),num:parseInt(c.code.slice(4),10),count:c.count,code:c.code}));
  [3,2,1].forEach(cnt=>{
    const grp={}; P.filter(x=>x.count===cnt).forEach(x=>{ const k=x.set+"|"+x.fac; (grp[k]=grp[k]||[]).push(x.num); });
    const groups=Object.keys(grp).map(k=>{ const pp=k.split("|"); return {set:+pp[0],fac:pp[1],nums:grp[k].sort((a,b)=>a-b)}; });
    groups.sort((a,b)=> a.nums.length-b.nums.length || a.set-b.set || a.fac.localeCompare(b.fac));
    wv(groups.length);
    groups.forEach(g=>{ wv(g.nums.length); wv(g.set); wv(F2ID[g.fac]); g.nums.forEach(n=>wv(n)); });
  });
  P.filter(x=>x.count>3).sort((a,b)=>a.code.localeCompare(b.code)).forEach(x=>{ wv(x.count); wv(x.set); wv(F2ID[x.fac]); wv(x.num); });
  return b32enc(out);
}
function deckUrl(deck){ const c=encodeDeck(deck||[]); return c?("https://runeterra.ar/decks/code/"+c):null; }

}

    </div>
  );
}
function Tournament({data,me,role,mutate}){
  const t=data.tournament||{phase:"idle"};
  const isAdmin=role==="admin";
  const players=t.players||[];
  const rounds=t.rounds||[];
  const rec=computeRecords(players,rounds);
  const stand=standing(players,rec,rounds,(data.tournament&&data.tournament.tiebreak)||{});

  const [nowTs,setNowTs]=useState(Date.now());
  const [view,setView]=useState("current");
  const [histSel,setHistSel]=useState(null);
  const [endArm,setEndArm]=useState(false);
  useEffect(()=>{ const id=setInterval(()=>setNowTs(Date.now()),30000); return ()=>clearInterval(id); },[]);
  function openTournament(){ mutate(d=>{ d.tournament={phase:"signup",name:"",server:"EMEA",startTime:Date.now()+2*3600000,signups:{},checkin:{}}; return d; }); }
  function setStart(ts){ mutate(d=>{ d.tournament.startTime=ts; return d; }); }
  function setServer(sv){ mutate(d=>{ d.tournament.server=sv; return d; }); }
  function setName(nm){ mutate(d=>{ d.tournament.name=nm; return d; }); }
  const [signupErr,setSignupErr]=useState("");
  function signUp(riot,disc){ const su=(data.tournament&&data.tournament.signups)||{}; const dup=Object.keys(su).some(function(u){ return u!==me && (su[u].riotId===riot || su[u].discordId===disc); }); if(dup){ setSignupErr("An account with this Riot ID or Discord ID is already signed up for this tournament. Log out and use that account (or check in with it)."); return; } setSignupErr(""); mutate(d=>{ const tt=d.tournament; if(tt.phase!=="signup")return d; if(!tt.signups)tt.signups={}; tt.signups[me]={riotId:riot,discordId:disc}; if(d.users[me]){ d.users[me].riotId=riot; d.users[me].discordId=disc; } return d; }); }
  function startSwiss(){ mutate(d=>{ const list=Object.keys(d.tournament.checkin||{}); if(list.length<4)return d; const R=swissRounds(list.length); const order=shuffle(list); const rc=computeRecords(list,[]); const m=pairRound(order,rc); d.tournament={phase:"swiss",checkin:d.tournament.checkin,players:list,round:1,totalRounds:R,rounds:[{matches:m}]}; return d; }); }
  function setWinner(ri,mi,w){ mutate(d=>{ const mm=d.tournament.rounds[ri].matches[mi]; mm.winner=w; mm.confirmed=true; return d; }); }
  function undo(ri,mi){ mutate(d=>{ const mm=d.tournament.rounds[ri].matches[mi]; mm.confirmed=false; mm.winner=null; mm.reports={}; return d; }); }
  function nextRound(){ mutate(d=>{ const tt=d.tournament; const cur=tt.rounds[tt.round-1]; if(cur.matches.some(m=>!m.confirmed))return d; if(tt.round>=tt.totalRounds)return d; const rc=computeRecords(tt.players,tt.rounds); const order=standing(tt.players,rc); const m=pairRound(order,rc); tt.rounds.push({matches:m}); tt.round++; return d; }); }
  function reset(){ mutate(d=>{ d.tournament={phase:"idle"}; return d; }); }
  function checkIn(){ mutate(d=>{ const tt=d.tournament; if(tt.phase!=="signup")return d; if(!tt.signups||!tt.signups[me])return d; if(Date.now()<(tt.startTime-7200000))return d; if(!tt.checkin)tt.checkin={}; if(tt.checkin[me])return d; tt.checkin[me]=true; if(d.users[me])d.users[me].coins=(d.users[me].coins||0)+5; logStat(d,"checkins",{a:me,wk:d.week||1,t:Date.now()}); return d; }); }
  function report(ri,mi,winner){ mutate(d=>{ const mm=d.tournament.rounds[ri].matches[mi]; if(mm.confirmed)return d; if(!mm.reports)mm.reports={}; mm.reports[me]=winner; if(mm.a&&mm.b&&mm.reports[mm.a]&&mm.reports[mm.b]&&mm.reports[mm.a]===mm.reports[mm.b]){ mm.winner=mm.reports[mm.a]; mm.confirmed=true; } return d; }); }
  function startTriangle(){ mutate(d=>{ const tt=d.tournament; const rc=computeRecords(tt.players,tt.rounds); const ord=standing(tt.players,rc); tt.tri=seedTri(ord.slice(0,8)); tt.phase="triangle"; return d; }); }
  function reportTri(k,winner){ mutate(d=>{ const tt=d.tournament; const mm=tt.tri[k]; if(mm.confirmed)return d; if(!mm.reports)mm.reports={}; mm.reports[me]=winner; if(mm.a&&mm.b&&mm.reports[mm.a]&&mm.reports[mm.b]&&mm.reports[mm.a]===mm.reports[mm.b]){ mm.winner=mm.reports[mm.a]; mm.confirmed=true; triRecompute(tt.tri); if(tt.tri.D1.confirmed){ tt.phase="done"; tt.champion=triW(tt.tri,"A1"); tt.placements=triPlacements(tt.tri); archiveTournament(d); } } return d; }); }

  function setTriWinner(k,w){ mutate(d=>{ const tt=d.tournament; const mm=tt.tri[k]; mm.winner=w; mm.confirmed=true; mm.report={winner:w,by:"admin"}; triRecompute(tt.tri); if(tt.tri.D1.confirmed){ tt.phase="done"; tt.champion=triW(tt.tri,"A1"); tt.placements=triPlacements(tt.tri); archiveTournament(d); } return d; }); }
  function awardAP(){ mutate(d=>{ const pl=d.tournament.placements||{}; const pts={1:5,2:3,3:2,4:1}; [1,2,3,4].forEach(k=>{ const u=pl[k]; if(u&&d.users[u]) d.users[u].aphro=(d.users[u].aphro||0)+pts[k]; }); d.tournament.awarded=true; return d; }); }

  if(view==="history"){

    return <div style={wrap} className="fu">{tabBar}{detail

          </div>

            {(detail.standings||[]).map((p,i)=>(

    const reg=me&&su[me]; const inCi=t.checkin&&me&&t.checkin[me];

    const ciOpen=nowTs>=(t.startTime-7200000);
    const startLocal=new Date(t.startTime).toLocaleString("en-US", {weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",hour12:true});
    const ciLocal=new Date(t.startTime-7200000).toLocaleString("en-US", {hour:"numeric",minute:"2-digit",hour12:true});

                  <button className="btn" onClick={()=>signUp(data.users[me].riotId,data.users[me].discordId)} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:900,letterSpacing:".04em"}}>Sign up</button>

              {inCi

      <div style={{...box,overflowX:"auto",paddingBottom:"14px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,minmax(140px,1fr))",gridTemplateRows:"repeat(5,auto)",gap:"9px 12px",minWidth:"760px"}}>
          {["A1","A2","A3","A4","B1","B2","B3","C1","C2","D1"].map(matchBox)}
          {["A1","B1","C1","D1"].map(winBox)}
          {["A4","B3","C2","D1"].map(loseBox)}
        </div>
      </div>
      {t.phase==="triangle"&&isAdmin&&<div style={box}>
        <div style={{...sLbl,marginBottom:"6px"}}>Finish this tournament</div>
        <div style={{fontSize:"15px",color:C.muted,marginBottom:"10px",lineHeight:1.5}}>Locks the placements from the matches confirmed so far and archives the tournament so anyone can browse it under Past tournaments. Use this when the remaining matches will not be played.</div>
        <button className="btn" onClick={()=>endArm?endTournament():setEndArm(true)} style={{width:"100%",padding:"11px",background:endArm?"#1a3a1a":"#0d1a12",border:"1px solid "+(endArm?"#4a8a4a":"#2a5a3a"),borderRadius:"8px",color:endArm?"#a8d8a8":"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:700}}>{endArm?"Confirm: end and archive now":"End this tournament"}</button>
      </div>}
      {t.phase==="done"&&<div style={box}>
        <div style={{...sLbl,marginBottom:"10px"}}>Final placements · Aphrodite Points</div>
        {[1,2,3,4].map(k=>(<div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #c8a96e10"}}>
          <span style={{fontSize:"18px",color:C.text}}><strong style={{color:C.gold}}>{k}.</strong> {pl[k]||"-"}</span>
          <span style={{fontSize:"17px",color:C.muted,fontFamily:"'Cinzel',serif"}}>+{({1:5,2:3,3:2,4:1})[k]} AP</span>
        </div>))}
        {(role==="admin"||role==="mod")&&(t.awarded
          ? <div style={{marginTop:"12px",fontSize:"16px",color:"#6ac68a",fontFamily:"'Cinzel',serif",textAlign:"center"}}>Aphrodite Points awarded to the top 4.</div>
          : <React.Fragment>
              <button className="btn" onClick={awardAP} style={{width:"100%",marginTop:"12px",padding:"11px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"9px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"18px",fontWeight:900}}>Award Aphrodite Points automatically (5/3/2/1)</button>
              <div style={{fontSize:"14px",color:"#948a74",marginTop:"8px",textAlign:"center",lineHeight:1.5}}>Or add them manually per account in the Accounts tab.</div>
            </React.Fragment>)}
      </div>}
    </div>;
  }

  // swiss
  const cur=rounds[t.round-1]||{matches:[]};
  const allDone=cur.matches.every(m=>m.confirmed);
  const bl={winners:"",lb1:"",lb2:"",eliminated:""};
  return <div style={wrap} className="fu">{tabBar}
    <div style={{...box,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"21px",fontWeight:600}}>Swiss</div><div style={{fontSize:"17px",color:C.muted}}>Round {t.round} of {t.totalRounds}</div></div>
      {isAdmin&&<div style={{display:"flex",gap:"7px"}}>
        {t.round<t.totalRounds
          ? <button className="btn" disabled={!allDone} onClick={nextRound} style={{padding:"9px 15px",background:allDone?"linear-gradient(135deg,#c8a96e,#9a7440)":"#111",border:"none",borderRadius:"8px",color:allDone?C.bg:C.faint,fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:700}}>Next round</button>
          : (allDone?<button className="btn" onClick={startTriangle} style={{padding:"9px 15px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"8px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:900}}>Start Triangle</button>:<span style={{fontSize:"17px",color:C.muted,fontFamily:"'Cinzel',serif",alignSelf:"center"}}>Finish all matches</span>)}
        <button className="btn" onClick={reset} style={{padding:"9px 12px",background:"transparent",border:"1px solid #5a2a2a",borderRadius:"8px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"15px"}}>Reset</button>
      </div>}
    </div>

    <div style={box}>
      <div style={{...sLbl,marginBottom:"10px"}}>Round {t.round} matches</div>
      {cur.matches.map((m,mi)=>{
        const mine=me&&(m.a===me||m.b===me);
        if(m.bye) return <div key={mi} style={{padding:"9px 0",borderBottom:"1px solid #c8a96e10",fontSize:"18px",color:C.muted}}><strong style={{color:C.text}}>{m.a}</strong> has a bye (free win)</div>;
        const ra=m.reports&&m.reports[m.a]; const rb=m.reports&&m.reports[m.b]; const conflict=ra&&rb&&ra!==rb; const myRep=(m.reports&&me)?m.reports[me]:null;
        return (
          <div key={mi} style={{padding:"10px 0",borderBottom:"1px solid #c8a96e10"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px",flexWrap:"wrap"}}>
              <div style={{fontSize:"20px",color:C.text}}><strong style={{color:m.confirmed&&m.winner===m.a?"#6ac68a":C.text}}>{m.a}</strong> <span style={{color:C.muted,fontSize:"17px"}}>vs</span> <strong style={{color:m.confirmed&&m.winner===m.b?"#6ac68a":C.text}}>{m.b}</strong></div>
              {m.confirmed
                ? <span style={{fontSize:"17px",color:"#6ac68a",fontFamily:"'Cinzel',serif"}}>{m.winner} won</span>
                : conflict? <span style={{fontSize:"16px",color:"#e07a7a",fontFamily:"'Cinzel',serif"}}>conflict - staff resolves</span>
                : (ra||rb)? <span style={{fontSize:"16px",color:"#e0b040",fontFamily:"'Cinzel',serif"}}>reported: {ra||rb} won - waiting</span>
                : <span style={{fontSize:"16px",color:C.muted}}>not reported</span>}
            </div>
            {mine&&!m.confirmed&&<div style={{display:"flex",gap:"7px",marginTop:"8px"}}>
              <button className="btn" onClick={()=>report(t.round-1,mi,me)} style={{flex:1,padding:"8px",background:myRep===me?"#0d1a12":"#0d0f18",border:"1px solid "+(myRep===me?"#2a5a3a":"#333"),borderRadius:"7px",color:myRep===me?"#6ac68a":C.text,fontFamily:"'Cinzel',serif",fontSize:"17px"}}>I won</button>
              <button className="btn" onClick={()=>report(t.round-1,mi,m.a===me?m.b:m.a)} style={{flex:1,padding:"8px",background:(myRep&&myRep!==me)?"#1a1010":"#0d0f18",border:"1px solid "+((myRep&&myRep!==me)?"#5a2a2a":"#333"),borderRadius:"7px",color:(myRep&&myRep!==me)?"#e0a0a0":C.muted,fontFamily:"'Cinzel',serif",fontSize:"17px"}}>I lost</button>
            </div>}
            {isAdmin&&!m.confirmed&&<div style={{display:"flex",gap:"6px",marginTop:"8px",flexWrap:"wrap"}}>
              <button className="btn" onClick={()=>setWinner(t.round-1,mi,m.a)} style={{padding:"6px 10px",background:"transparent",border:"1px solid #444",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>{m.a} won</button>
              <button className="btn" onClick={()=>setWinner(t.round-1,mi,m.b)} style={{padding:"6px 10px",background:"transparent",border:"1px solid #444",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"15px"}}>{m.b} won</button>
            </div>}
            {isAdmin&&m.confirmed&&!m.bye&&<button className="btn" onClick={()=>undo(t.round-1,mi)} style={{marginTop:"6px",padding:"4px 10px",background:"transparent",border:"1px solid #4a2222",borderRadius:"6px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"15px"}}>undo</button>}
          </div>
        );
      })}
    </div>

    <div style={box}>
      <div style={{...sLbl,marginBottom:"10px"}}>Standings</div>
      <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"3px 0",borderBottom:"1px solid #c8a96e22",fontSize:"13px",color:C.muted,fontFamily:"'Cinzel',serif",letterSpacing:".05em"}}>
        <span style={{width:"20px"}}>#</span><span style={{flex:1}}>Player</span><span style={{fontSize:"12px"}}>Bh · Sk</span><span style={{minWidth:"46px",textAlign:"right"}}>W-L</span>
      </div>
      {stand.map((n,i)=>{ const uu=data.users[n]||{};
        return (
        <div key={n} style={{padding:"7px 0",borderBottom:"1px solid #c8a96e10"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{width:"20px",fontFamily:"'Cinzel',serif",color:i<8?C.gold:"#3a3a3a",fontSize:"18px",fontWeight:900}}>{i+1}</span>
          <span style={{flex:1,minWidth:0,fontSize:"18px",color:n===me?C.gold:C.text}}>{n}</span>
          {(()=>{const url=deckUrl(uu.deck);return url?<a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:"15px",color:"#5599cc",textDecoration:"none",fontFamily:"'Cinzel',serif"}}>deck ↗</a>:null;})()}
          <span style={{fontSize:"14px",color:"#8a8172",fontFamily:"'Cinzel',serif",whiteSpace:"nowrap"}}>Bh {buch(n,rec)} · Sk {solk(n,rec)}</span>
          {isAdmin&&<div style={{display:"flex",flexDirection:"column",gap:"1px"}}>
            <button className="btn" onClick={()=>setTiebreak(n,1)} style={{padding:"0 7px",background:"transparent",border:"1px solid #333",borderRadius:"4px",color:C.muted,fontSize:"13px",lineHeight:"17px"}}>▲</button>
            <button className="btn" onClick={()=>setTiebreak(n,-1)} style={{padding:"0 7px",background:"transparent",border:"1px solid #333",borderRadius:"4px",color:C.muted,fontSize:"13px",lineHeight:"17px"}}>▼</button>
          </div>}
          <span style={{fontSize:"17px",color:C.muted,fontFamily:"'Cinzel',serif",minWidth:"46px",textAlign:"right"}}>{rec[n].w}-{rec[n].l}</span>
        </div>
        {(uu.riotId||uu.discordId) && <div style={{marginLeft:"30px",marginTop:"2px",display:"flex",gap:"12px",flexWrap:"wrap",fontSize:"14px",color:C.muted}}>
          {uu.riotId?<span>Riot: <span style={{color:"#a89c86"}}>{uu.riotId}</span></span>:null}
          {uu.discordId?<span>Discord: <span style={{color:"#a89c86"}}>{uu.discordId}</span></span>:null}
        </div>}
        </div>
      ); })}
      <div style={{fontSize:"15px",color:"#948a74",marginTop:"8px",lineHeight:1.5}}>Sorted by wins, then Buchholz (Bh), Solkoff (Sk), head-to-head. Admins can nudge with ▲▼ to break any remaining tie manually. Top 8 advance to the Triangle bracket.</div>
    </div>
  </div>;
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [data,setData]=useState(null);
  const [dbErr,setDbErr]=useState(null);
  const [me,setMe]=useState(()=>{ try{return sessionStorage.getItem("at_me")||null;}catch(e){return null;} });
  const [spectator,setSpectator]=useState(false);
  const [db,setDb]=useState(null);
  const [starters,setStarters]=useState(null);

  useEffect(()=>{
    Promise.all([fetch("./cards.json").then(r=>r.json()), fetch("./starter.json").then(r=>r.json())])
      .then(([cards,st])=>{ setDb(buildDB(cards)); setStarters(st); })
      .catch(e=>console.error("card data load failed:",e));
  },[]);

  useEffect(()=>{
    if(!CONFIG_OK) return;
    let off=null, dead=false;
    function handle(snap){
      const val=snap.val();
      if(val===null){ stateRef.set(SEED); return; }
      if(!val.testSeeded){
        const nu=JSON.parse(JSON.stringify(val)); if(!nu.users) nu.users={};
        for(let i=1;i<=8;i++){ const n="Test"+i; if(!nu.users[n]) nu.users[n]=freshTest(); }
        nu.testSeeded=true; stateRef.set(nu); return;
      }
      if(val.users && val.users.Storyteller && val.users.Storyteller.password==="5r2w"){
        const nu=JSON.parse(JSON.stringify(val)); nu.users.Storyteller.password=ADMIN_PW; stateRef.set(nu); return;
      }
      if(val.users && !val.modSeeded){
        const nu=JSON.parse(JSON.stringify(val)); if(!nu.users.Aphrodite) nu.users.Aphrodite=freshMod(); nu.modSeeded=true; stateRef.set(nu); return;
      }
      if(val.users && val.users.Aphrodite && val.users.Aphrodite.role==="mod"){
        const nu=JSON.parse(JSON.stringify(val)); nu.users.Aphrodite.role="admin"; stateRef.set(nu); return;
      }
      const plain=Object.keys(val.users||{}).filter(n=>val.users[n].password && !isHashed(val.users[n].password));
      if(plain.length && subtleOK()){
        (async ()=>{
          try{
            const nu=JSON.parse(JSON.stringify(val));
            for(let i=0;i<plain.length;i++){ const n=plain[i]; nu.users[n].password=await pwHash(n,nu.users[n].password); }
            stateRef.set(nu);
          }catch(e){ console.error("Password migration failed:",e); setData(val); }
        })();
        return;
      }
      setData(val);
    }
    function attach(){
      if(dead||off) return;
      off = stateRef.on("value", handle, err=>{
        console.error("Firebase:",err);
        setDbErr((err&&(err.code||err.message))||"permission-denied");
      });
    }
    if(firebase.auth){
      firebase.auth().signInAnonymously()
        .then(()=>attach())
        .catch(e=>{ console.warn("Anonymous sign-in unavailable:",e&&e.code); attach(); });
    } else { attach(); }
    return ()=>{ dead=true; if(off) stateRef.off("value", off); };
  },[]);

  function mutate(fn){
    setData(prev=>{
      const next=fn(JSON.parse(JSON.stringify(prev||SEED)));
      if(stateRef) stateRef.set(next);
      return next;
    });
  }
  function login(n){ setMe(n); try{sessionStorage.setItem("at_me",n);}catch(e){} }
  async function register(n,pw,riot,disc){ const h=await pwHash(n,pw); mutate(d=>{ if(!d.users)d.users={}; if(d.users[n]) return d; const np=freshPlayer(h); np.coins=100+95*((d.week||1)-1); np.riotId=riot||""; np.discordId=disc||""; d.users[n]=np; return d; }); }
  function requestReset(n){ mutate(d=>{ if(!d.users||!d.users[n])return d; if(!d.pwRequests)d.pwRequests={}; d.pwRequests[n]=Date.now(); return d; }); }
  function logout(){ setMe(null); setSpectator(false); try{sessionStorage.removeItem("at_me");}catch(e){} }
  async function changePw(current,newPw){ const u=data.users[me]; if(!u) return "Not logged in."; if(!newPw||!newPw.trim()) return "Enter a new password."; if(!u.noPassword){ const ok=await pwVerify(me,current,u.password); if(!ok) return "Current password is wrong."; } const h=await pwHash(me,newPw.trim()); mutate(d=>{ if(d.users[me]){ d.users[me].password=h; d.users[me].noPassword=false; } return d; }); return null; }

  if(!CONFIG_OK) return <SetupScreen/>;
  if(dbErr) return (
    <div style={wrap}>
      <div style={{...sCard,maxWidth:"520px",borderColor:"#5a2a2a"}}>
        <div style={{...sLbl,marginBottom:"10px",color:"#e07a7a"}}>Database locked out</div>
        <div style={{fontSize:"18px",color:C.text,lineHeight:1.6,marginBottom:"12px"}}>The app could not read the database ({String(dbErr)}).</div>
        <div style={{fontSize:"16px",color:C.muted,lineHeight:1.6}}>If you just changed the Database Rules, turn on Anonymous sign-in in Firebase (Authentication, Sign-in method, Anonymous, Enable) and reload this page.</div>
      </div>
    </div>
  );
  if(!data) return <Loading/>;
  if(spectator) return <Spectator data={data} onLeave={()=>setSpectator(false)}/>;
  if(!me || !(data.users && data.users[me])) {
    // not logged in (or account no longer exists) → login
    return <Login data={data} onLogin={login} onSpectator={()=>setSpectator(true)} onRegister={register} onRequestReset={requestReset}/>;
  }

  const role=data.users[me].role;
  return (
    <div style={{minHeight:"100vh"}}>
      <TopBar me={me} role={role} coins={data.users[me].coins} onLogout={logout} changePw={changePw}/>
      {(role==="admin"||role==="mod") ? <AdminHome data={data} mutate={mutate} me={me} db={db}/> : (db&&starters ? <PlayerHome data={data} me={me} db={db} starters={starters} mutate={mutate}/> : <Loading/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
