<!doctype html>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%8F%9B%EF%B8%8F%3C/text%3E%3C/svg%3E"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060810;color:#e8d5b0;font-family:'Crimson Pro',Georgia,serif;font-size:16px}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-thumb{background:#c8a96e44;border-radius:3px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glow{0%,100%{text-shadow:0 0 20px #c8a96e55}50%{text-shadow:0 0 44px #c8a96ecc}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .fu{animation:fadeUp .35s ease forwards}
  .glow{animation:glow 3s ease infinite}
  .spin{animation:spin 1.2s linear infinite}
  .btn{transition:transform .1s;cursor:pointer}
  .btn:active{transform:scale(.97)}
  .btn:disabled{cursor:not-allowed;opacity:.35}
  input{outline:none}
  a{color:#5599cc}
</style>

/* ---------- theme ---------- */
const C = {bg:"#060810",surface:"#0d0f18",dim:"#0a0c14",gold:"#c8a96e",text:"#e8d5b0",muted:"#7c715b",faint:"#3a3a3a"};
const sCard={background:C.surface,border:"1px solid #c8a96e28",borderRadius:"12px",padding:"18px"};
const sLbl={fontFamily:"'Cinzel',serif",fontSize:"11px",color:C.muted,letterSpacing:".1em",textTransform:"uppercase"};
const sInp={width:"100%",background:C.bg,border:"1px solid #c8a96e44",borderRadius:"8px",padding:"10px 14px",color:C.text,fontFamily:"'Crimson Pro',serif",fontSize:"17px"};
const wrap={display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"40px 20px",background:"radial-gradient(ellipse at 50% -10%,#1a1200,#060810 55%)"};

/* ---------- helpers ---------- */
function genPw(){const d="23456789",l="abcdefghjkmnpqrstuvwxyz";const r=a=>a[Math.floor(Math.random()*a.length)];return r(d)+r(l)+r(d)+r(l);}

/* ---------- data model (shared, in Firebase) ---------- */
function freshAdmin(){ return {password:"5r2w",role:"admin",coins:0,deck:null,starter:null,riotId:"",discordId:"",aphro:0}; }
function freshPlayer(pw){ return {password:pw,role:"player",coins:100,deck:null,starter:null,riotId:"",discordId:"",aphro:0}; }

const SEED = {
  users: { Storyteller: freshAdmin() },
  pending: {},
  season: 1,
  week: 1,
  prepEnded: false,     // false = Prep Time (players can edit), true = locked for matchday
  champion: null,
  tournament: { started:false },
};

/* ============================================================
   SETUP SCREEN (shown until you paste your Firebase config)
   ============================================================ */
function SetupScreen(){
  const steps = [
    ["Create a Firebase project", "console.firebase.google.com → Add project (any name, e.g. aphrodites-tales). You can skip Google Analytics."],
    ["Add a Web app", "In the project, click the </> (Web) icon → register an app → you'll get a firebaseConfig object."],

  ];
  return (
    <div style={wrap}>
      <div className="fu" style={{...sCard,maxWidth:"560px",width:"100%",borderColor:"#c8a96e55"}}>
        <div className="glow" style={{fontFamily:"'Cinzel',serif",fontSize:"22px",fontWeight:900,color:C.gold,letterSpacing:".1em",textAlign:"center",marginBottom:"6px"}}>APHRODITE'S TALES</div>
        <div style={{textAlign:"center",color:C.muted,fontSize:"13px",marginBottom:"18px"}}>Firebase setup required</div>
        {steps.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:"12px",marginBottom:"14px"}}>
            <div style={{flexShrink:0,width:"26px",height:"26px",borderRadius:"50%",background:"#c8a96e18",border:"1px solid #c8a96e55",color:C.gold,fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",color:C.text,fontSize:"14px",fontWeight:600,marginBottom:"3px"}}>{s[0]}</div>
              <div style={{fontSize:"13px",color:"#9c917b",lineHeight:1.6}}>{s[1]}</div>
            </div>
          </div>
        ))}
        <div style={{marginTop:"6px",padding:"12px 14px",background:C.dim,borderRadius:"8px",border:"1px solid #c8a96e22",fontSize:"12.5px",color:"#9c917b",lineHeight:1.6}}>

}

function Loading(){
  return (
    <div style={{...wrap,gap:"16px"}}>
      <div className="spin" style={{width:"44px",height:"44px",borderRadius:"50%",border:"3px solid #c8a96e33",borderTopColor:C.gold}}/>
      <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"13px",letterSpacing:".1em"}}>Connecting to the archive</div>
    </div>
  );
}

/* ============================================================
   LOGIN / REGISTER
   ============================================================ */
function Login({data,onLogin,onSpectator,onRegister}){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);

  function doLogin(){
    const n=name.trim();
    if(!n){setErr("Enter a username.");return;}
    if(n==="Spectator"){onSpectator();return;}
    const u=data.users&&data.users[n];
    if(!u){ setErr("Account not found."); return; }
    if(u.password!==pw){ setErr("Incorrect password."); return; }
    onLogin(n);
  }
  function doReg(){
    const n=name.trim();
    if(!n){setErr("Enter your Discord username.");return;}
    if(n==="Spectator"){setErr("Reserved name.");return;}
    if((data.users&&data.users[n])||(data.pending&&data.pending[n])){setErr("Name already taken or pending.");return;}
    onRegister(n);
    setDone(true);
  }

  if(done) return (
    <div style={wrap}>
      <div className="fu" style={{...sCard,maxWidth:"420px",width:"100%",textAlign:"center",borderColor:"#c8a96e55"}}>
        <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"15px",fontWeight:600,marginBottom:"10px"}}>Registration submitted</div>
        <div style={{fontSize:"13px",color:"#aaa",lineHeight:1.7}}>Your account <strong style={{color:C.text}}>{name.trim()}</strong> is pending. An admin will approve you and DM your password on Discord.</div>
        <button className="btn" onClick={()=>{setDone(false);setMode("login");setName("");}} style={{marginTop:"18px",padding:"9px 22px",background:"#c8a96e18",border:"1px solid #c8a96e44",borderRadius:"8px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:"12px"}}>Back to login</button>
      </div>
    </div>
  );

  return (
    <div style={wrap}>
      <div className="glow" style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,5vw,40px)",fontWeight:900,color:C.gold,textAlign:"center",letterSpacing:".12em",marginBottom:"6px"}}>APHRODITE'S TALES</div>
      <div style={{...sLbl,marginBottom:"30px",letterSpacing:".3em",textAlign:"center"}}>Powered by Storyteller</div>
      <div className="fu" style={{width:"100%",maxWidth:"400px",display:"flex",flexDirection:"column",gap:"13px"}}>
        {mode==="login" ? (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Login</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Username" style={{...sInp,marginBottom:"8px"}}/>
              <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" type="password" style={sInp} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"13px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doLogin} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:900,letterSpacing:".15em"}}>ENTER</button>
            <div style={{padding:"13px",background:"#c8a96e08",border:"1px solid #c8a96e15",borderRadius:"10px",textAlign:"center"}}>
              <div style={{fontSize:"12px",color:C.muted,marginBottom:"9px"}}>Enter <strong style={{color:"#888"}}>Spectator</strong> as the username to watch (no password).</div>
              <button className="btn" onClick={()=>{setMode("register");setErr("");}} style={{padding:"5px 14px",background:"transparent",border:"1px solid #c8a96e33",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Register new account →</button>
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={sCard}>
              <div style={{...sLbl,marginBottom:"10px"}}>Register</div>
              <div style={{fontSize:"13px",color:C.muted,marginBottom:"12px",lineHeight:1.6}}>Enter your Discord username. An admin will approve you and DM your password.</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Discord username" style={sInp}/>
            </div>
            {err && <div style={{color:"#cc4444",fontSize:"13px",textAlign:"center",fontFamily:"'Cinzel',serif"}}>{err}</div>}
            <button className="btn" onClick={doReg} style={{padding:"14px",background:"linear-gradient(135deg,#c8a96e,#9a7440)",border:"none",borderRadius:"10px",color:C.bg,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:900,letterSpacing:".15em"}}>SUBMIT REGISTRATION</button>
            <button className="btn" onClick={()=>{setMode("login");setErr("");}} style={{padding:"10px",background:"transparent",border:"1px solid #333",borderRadius:"8px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"12px"}}>← Back</button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   TOP BAR
   ============================================================ */
function TopBar({me,role,coins,onLogout}){
  return (
    <div style={{background:"#090b13",borderBottom:"1px solid #c8a96e1a",padding:"10px 18px",position:"sticky",top:0,zIndex:50,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"13px",fontWeight:900,color:C.gold,letterSpacing:".1em"}}>APHRODITE'S TALES</div>
        <div style={{fontSize:"11px",color:C.muted,marginTop:"1px"}}>{me}{role==="admin"?" · Admin":""}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {role!=="admin" && <div style={{display:"flex",alignItems:"center",gap:"6px",background:"#c8a96e15",border:"1px solid #c8a96e44",borderRadius:"20px",padding:"4px 13px",fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"14px",fontWeight:600}}>{coins||0} coins</div>}
        <button className="btn" onClick={onLogout} style={{padding:"5px 10px",background:"transparent",border:"1px solid #333",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Logout</button>
      </div>
    </div>
  );
}

/* ============================================================
   ADMIN HOME (foundation: approvals + roster + prep phase)
   ============================================================ */
function AdminHome({data,mutate}){
  const [atab,setAtab]=useState("home");
  const [msg,setMsg]=useState("");
  const [delArm,setDelArm]=useState("");
  const [resetArm,setResetArm]=useState(false);
  const pending=Object.keys(data.pending||{});
  const players=Object.keys(data.users||{}).filter(n=>data.users[n].role==="player");

  function approve(n){ mutate(d=>{ const p=d.pending&&d.pending[n]; if(!p)return d; d.users[n]=freshPlayer(p.password); delete d.pending[n]; return d; }); setMsg(n+" approved."); }
  function deny(n){ mutate(d=>{ if(d.pending) delete d.pending[n]; return d; }); }
  function togglePrep(){ mutate(d=>{ d.prepEnded=!d.prepEnded; return d; }); }
  function newWeek(){ mutate(d=>{ d.week=(d.week||1)+1; d.prepEnded=false; const us=d.users||{}; Object.keys(us).forEach(n=>{ if(us[n].role==="player") us[n].coins=(us[n].coins||0)+100; }); return d; }); setMsg("New week started. +100 coins to all players."); }
  function delPlayer(n){ mutate(d=>{ if(d.users) delete d.users[n]; return d; }); setDelArm(""); setMsg(n+" deleted."); }
  function resetAll(){ mutate(d=>{ const keep={}; Object.keys(d.users||{}).forEach(n=>{ if(d.users[n].role==="admin") keep[n]=d.users[n]; }); d.users=keep; d.pending={}; d.week=1; d.season=1; d.prepEnded=false; d.champion=null; d.tournament={started:false}; return d; }); setResetArm(false); setMsg("All test accounts cleared."); }

  const tab=(t,label)=>(
    <button key={t} className="btn" onClick={()=>{setAtab(t);setMsg("");setDelArm("");setResetArm(false);}}
      style={{flex:1,padding:"9px 4px",background:atab===t?"#c8a96e18":"transparent",border:"1px solid "+(atab===t?"#c8a96e44":"transparent"),borderRadius:"7px",color:atab===t?C.gold:C.muted,fontFamily:"'Cinzel',serif",fontSize:"12px",fontWeight:600,letterSpacing:".04em"}}>{label}</button>
  );

  return (
    <div style={{padding:"14px 18px",maxWidth:"640px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}} className="fu">
      <div style={{display:"flex",gap:"3px",background:"#090b12",borderRadius:"10px",padding:"4px",border:"1px solid #c8a96e1a"}}>
        {tab("home","Home")}{tab("players","Players")}{tab("bracket","Bracket")}
      </div>

      {atab==="home" && (
        <React.Fragment>
          <div style={sCard}>
            <div style={{...sLbl,marginBottom:"6px"}}>Season {data.season||1} · Week {data.week||1}</div>
            <div style={{fontSize:"12px",color:C.muted,marginBottom:"10px",lineHeight:1.6}}>{data.prepEnded ? "Decks are LOCKED for the matchday. Players cannot edit until you start the next week." : "Prep Time is OPEN. Players can buy, open packs, and remove cards."}</div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
              <button className="btn" onClick={togglePrep} style={{flex:1,minWidth:"150px",padding:"9px",background:data.prepEnded?"#1a1400":"#0d1a2a",border:"1px solid "+(data.prepEnded?"#c8a96e55":"#334466"),borderRadius:"8px",color:data.prepEnded?C.gold:"#5599cc",fontFamily:"'Cinzel',serif",fontSize:"12px",fontWeight:600}}>{data.prepEnded?"Reopen Prep Time":"End Prep Time"}</button>
              <button className="btn" onClick={newWeek} style={{flex:1,minWidth:"150px",padding:"9px",background:"#0d1a12",border:"1px solid #2a5a3a",borderRadius:"8px",color:"#6ac68a",fontFamily:"'Cinzel',serif",fontSize:"12px",fontWeight:600}}>Start next week (+100 all)</button>
            </div>
          </div>
          <div style={sCard}>
            <div style={{...sLbl,marginBottom:"10px"}}>Registrations ({pending.length})</div>
            {pending.length===0 && <div style={{fontSize:"13px",color:C.muted}}>No pending registrations.</div>}
            {pending.map(n=>(
              <div key={n} style={{display:"flex",alignItems:"center",gap:"12px",padding:"9px 0",borderBottom:"1px solid #c8a96e10"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:"14px",color:C.text,fontWeight:600}}>{n}</div>
                  <div style={{fontFamily:"monospace",fontSize:"18px",color:C.gold,letterSpacing:".1em"}}>{data.pending[n].password}</div>
                </div>
                <button className="btn" onClick={()=>approve(n)} style={{padding:"6px 12px",background:"#1a3a1a",border:"1px solid #3a6a3a",borderRadius:"6px",color:"#6c6",fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Approve</button>
                <button className="btn" onClick={()=>deny(n)} style={{padding:"6px 12px",background:"#1a0a0a",border:"1px solid #4a2222",borderRadius:"6px",color:"#c66",fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Deny</button>
              </div>
            ))}
          </div>
        </React.Fragment>
      )}

      {atab==="players" && (
        <React.Fragment>
          <div style={sCard}>
            <div style={{...sLbl,marginBottom:"10px"}}>Players ({players.length})</div>
            {players.length===0 && <div style={{fontSize:"13px",color:C.muted}}>No players yet.</div>}
            {players.map(n=>{
              const u=data.users[n];
              return (
                <div key={n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"10px",padding:"9px 0",borderBottom:"1px solid #c8a96e10"}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:"13px",color:C.text}}>{n}{u.riotId?<span style={{color:C.muted,fontSize:"11px"}}> · {u.riotId}</span>:null}</div>
                    <div style={{fontSize:"11px",color:C.muted}}>pw {u.password} · {u.coins||0} coins · {u.aphro||0} AP · {u.starter?("deck: "+u.starter):"no deck"}</div>
                  </div>
                  {delArm===n
                    ? <button className="btn" onClick={()=>delPlayer(n)} style={{flexShrink:0,padding:"6px 10px",background:"#3a1010",border:"1px solid #a33",borderRadius:"6px",color:"#f88",fontFamily:"'Cinzel',serif",fontSize:"11px",fontWeight:700}}>Confirm delete</button>
                    : <button className="btn" onClick={()=>{setDelArm(n);setResetArm(false);}} style={{flexShrink:0,padding:"6px 10px",background:"transparent",border:"1px solid #5a2a2a",borderRadius:"6px",color:"#a66",fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Delete</button>}
                </div>
              );
            })}
          </div>
          <div style={{...sCard,borderColor:"#5a2a2a"}}>
            <div style={{...sLbl,marginBottom:"6px",color:"#a66"}}>Danger zone</div>
            <div style={{fontSize:"12px",color:C.muted,marginBottom:"10px",lineHeight:1.6}}>Removes every player and pending registration (keeps the Storyteller admin) and resets the season. Use this to wipe the board after a test.</div>
            <button className="btn" onClick={()=>resetArm?resetAll():setResetArm(true)} style={{width:"100%",padding:"9px",background:resetArm?"#3a1010":"transparent",border:"1px solid "+(resetArm?"#a33":"#5a2a2a"),borderRadius:"8px",color:resetArm?"#f88":"#a66",fontFamily:"'Cinzel',serif",fontSize:"12px",fontWeight:600}}>{resetArm?"Confirm: delete ALL players & reset":"Delete all test accounts & reset season"}</button>
          </div>
        </React.Fragment>
      )}

      {atab==="bracket" && (
        <div style={{...sCard,textAlign:"center"}}>
          <div style={{...sLbl,marginBottom:"8px"}}>Tournament</div>
          <div style={{fontSize:"13px",color:C.muted,lineHeight:1.7}}>The Swiss → Triangle bracket, check-in, and match reporting are being built next. Once ready, you'll run the whole tournament from here.</div>
        </div>
      )}

      {msg && <div style={{padding:"10px 14px",background:"#0a1a0a",border:"1px solid #3a6a3a",borderRadius:"8px",color:"#8c8",fontSize:"13px",fontFamily:"'Cinzel',serif"}}>{msg}</div>}
    </div>
  );
}

/* ============================================================
   PLAYER HOME (foundation)
   ============================================================ */
function PlayerHome({data,me,db,starters,mutate}){
  const u=data.users[me]||{};
  const deck=u.deck||[];
  const locked=!!data.prepEnded;
  const coins=u.coins||0;
  const [tab,setTab]=useState("deck");

  function pickStarter(name,deckArr){ mutate(d=>{ d.users[me].starter=name; d.users[me].deck=deckArr; return d; }); }
  function buyCard(code,price){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<price||deckRuleBlock(db,uu.deck||[],code)) return d; uu.coins=(uu.coins||0)-price; uu.deck=addToDeck(uu.deck||[],code); return d; }); }
  function removeCards(sel,cost){ mutate(d=>{ const uu=d.users[me]; if(!!d.prepEnded||(uu.coins||0)<cost) return d; let dk=(uu.deck||[]).map(e=>({...e})); Object.keys(sel).forEach(code=>{ const e=dk.find(x=>x.code===code); if(e) e.count-=sel[code]; }); uu.deck=dk.filter(e=>e.count>0); uu.coins=(uu.coins||0)-cost; return d; }); }

  if(!u.starter || !deck.length) return <StarterSelect starters={starters} db={db} onPick={pickStarter}/>;

  const tb=(t,l)=>(<button key={t} className="btn" onClick={()=>setTab(t)} style={{flex:1,padding:"11px 4px",background:tab===t?"#c8a96e12":"transparent",border:"none",borderBottom:"2px solid "+(tab===t?C.gold:"transparent"),color:tab===t?C.gold:C.muted,fontFamily:"'Cinzel',serif",fontSize:"12.5px",fontWeight:600,letterSpacing:".03em"}}>{l}</button>);

  return (
    <div>
      {locked && <div style={{background:"#1a1400",borderBottom:"1px solid #c8a96e33",padding:"7px",textAlign:"center",fontFamily:"'Cinzel',serif",fontSize:"11.5px",color:C.gold}}>Prep Time is over. Your deck is locked for the matchday.</div>}
      <div style={{display:"flex",background:"#090b12",borderBottom:"1px solid #c8a96e1a",position:"sticky",top:0,zIndex:40}}>
        {tb("deck","My Deck")}{tb("store","Store")}
      </div>
      {tab==="deck" && <DeckView db={db} deck={deck} locked={locked} coins={coins} onRemove={removeCards}/>}
      {tab==="store" && <Store db={db} deck={deck} coins={coins} locked={locked} onBuy={buyCard}/>}
    </div>
  );
}

/* ============================================================
   SPECTATOR (foundation)
   ============================================================ */
function Spectator({data,onLeave}){
  const players=Object.keys(data.users||{}).filter(n=>data.users[n].role==="player");
  return (
    <div style={{minHeight:"100vh"}}>
      <div style={{background:"#090b13",borderBottom:"1px solid #c8a96e1a",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"13px",fontWeight:900,color:C.gold,letterSpacing:".1em"}}>APHRODITE'S TALES</div>
        <button className="btn" onClick={onLeave} style={{padding:"5px 10px",background:"transparent",border:"1px solid #333",borderRadius:"6px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"11px"}}>Leave</button>
      </div>
      <div style={{padding:"14px 18px",maxWidth:"640px",margin:"0 auto"}} className="fu">
        <div style={{...sLbl,marginBottom:"10px"}}>Competitors ({players.length})</div>
        {players.length===0 && <div style={{...sCard,textAlign:"center",color:C.muted,fontSize:"13px"}}>No players yet.</div>}
        {players.map(n=>(
          <div key={n} style={{...sCard,padding:"11px 14px",marginBottom:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:"13px",color:C.text}}>{n}</div>
            <div style={{fontSize:"12px",color:C.muted}}>{(data.users[n].aphro||0)} AP</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   CARD DATA + GAME (deck / store / removal)
   ============================================================ */
const REGIONS=["Demacia","Freljord","Ionia","Noxus","Piltover & Zaun","Shadow Isles","Bilgewater","Shurima","Mount Targon","Bandle City"];
const REGCOL={Demacia:"#e3c44a",Freljord:"#62c4e8",Ionia:"#ef74b6",Noxus:"#d23b37","Piltover & Zaun":"#e58a26","Shadow Isles":"#2bb56e",Bilgewater:"#1fa8a8",Shurima:"#e0b133","Mount Targon":"#9a72d8","Bandle City":"#a9c24a"};
const RARCOL=["#8fa3b0","#5b8fd0","#b25fd6","#e0b040"];
const ECON={PACK_COST:1,DECK_FLOOR:10,DECK_MAX:100,MAX_COPIES:3,MAX_CHAMPS:20,PACK_SIZE:5};

function buildDB(cards){
  const by={}; cards.forEach(c=>{ by[c[0]]=c; });
  const pools={}; REGIONS.forEach(r=>pools[r]=[]);
  cards.forEach(c=>{ const regs=c[5]||[]; REGIONS.forEach(r=>{ if(regs.indexOf(r)>=0||regs.indexOf("Runeterra ("+r+")")>=0) pools[r].push(c[0]); }); });
  return {list:cards, by, pools};
}
const cCode=c=>c[0], cName=c=>c[1], cMana=c=>c[2], cRar=c=>c[3], cChamp=c=>c[4]===1, cRegs=c=>c[5]||[], cCoin=c=>c[6], cImg=c=>c[8]||"";
function coinOf(db,code){ const c=db.by[code]; return c?cCoin(c):20; }
function isChampCode(db,code){ const c=db.by[code]; return !!c&&cChamp(c); }
function deckTotal(deck){ return (deck||[]).reduce((s,e)=>s+(e.count||0),0); }
function uniqueChamps(db,deck){ return (deck||[]).filter(e=>isChampCode(db,e.code)).length; }
function copiesOf(deck,code){ const e=(deck||[]).find(x=>x.code===code); return e?e.count:0; }
function addToDeck(deck,code){ const d=(deck||[]).map(e=>({...e})); const e=d.find(x=>x.code===code); if(e)e.count++; else d.push({code,count:1}); return d; }
function deckRuleBlock(db,deck,code){
  if(deckTotal(deck)>=ECON.DECK_MAX) return "Deck full ("+ECON.DECK_MAX+")";
  if(copiesOf(deck,code)>=ECON.MAX_COPIES) return "Max "+ECON.MAX_COPIES+" copies";
  if(isChampCode(db,code)&&copiesOf(deck,code)===0&&uniqueChamps(db,deck)>=ECON.MAX_CHAMPS) return "Max "+ECON.MAX_CHAMPS+" champions";
  return null;
}
function removalCost(n){ if(n>=100)return 1; if(n>=90)return 2; if(n>=80)return 5; if(n>=70)return 10; if(n>=60)return 20; if(n>=50)return 50; if(n>=40)return 100; if(n>=30)return 200; if(n>=20)return 500; if(n>=11)return 1000; return 0; }
function removalBatch(n){ return Math.max(0,Math.min(10,n-ECON.DECK_FLOOR)); }

const rTab=(on,col)=>({padding:"4px 9px",background:on?(col||"#c8a96e")+"22":"transparent",border:"1px solid "+(on?(col||"#c8a96e")+"88":"#333"),borderRadius:"6px",color:on?(col||"#c8a96e"):C.muted,fontFamily:"'Cinzel',serif",fontSize:"10.5px",cursor:"pointer",whiteSpace:"nowrap"});

function CardThumb({card,w,dim,badge,onClick,sub}){
  const rc=RARCOL[cRar(card)]||"#888";
  return (
    <div onClick={onClick} className={onClick?"btn":""} style={{width:w+"px",flexShrink:0,cursor:onClick?"pointer":"default",opacity:dim?0.4:1}}>
      <div style={{position:"relative",borderRadius:"7px",overflow:"hidden",border:"1px solid "+rc+"66",background:"#0b0c14"}}>
        <img src={cImg(card)} alt={cName(card)} loading="lazy" style={{width:"100%",display:"block"}} onError={e=>{e.target.style.opacity=0;}}/>
        {badge!==undefined && <div style={{position:"absolute",top:"3px",right:"3px",background:"rgba(0,0,0,.82)",border:"1px solid #c8a96e66",borderRadius:"10px",padding:"1px 6px",fontFamily:"'Cinzel',serif",fontSize:"11px",color:C.gold,fontWeight:600}}>{badge}</div>}
      </div>
      {sub!==undefined && <div style={{fontSize:"10px",color:"#e8a488",textAlign:"center",marginTop:"2px"}}>{sub}</div>}
    </div>
  );
}

function StarterSelect({starters,db,onPick}){
  const [sel,setSel]=useState(null);
  return (
    <div style={{padding:"16px 18px",maxWidth:"720px",margin:"0 auto"}} className="fu">
      <div style={{...sLbl,marginBottom:"4px",textAlign:"center"}}>Choose your deck</div>
      <div style={{fontSize:"13px",color:C.muted,textAlign:"center",marginBottom:"16px",lineHeight:1.6}}>Pick one starter deck. You can't change your choice until the season ends. You'll shape it by buying cards, opening packs, and removing cards.</div>
      <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        {starters.map(s=>{
          const champs=s.codes.filter(c=>isChampCode(db,c)).slice(0,4).map(c=>db.by[c]).filter(Boolean);
          const on=sel===s.name;
          return (
            <div key={s.name} onClick={()=>setSel(s.name)} className="btn" style={{...sCard,cursor:"pointer",border:"1px solid "+(on?"#c8a96e":"#c8a96e22"),background:on?"#c8a96e0f":C.surface,display:"flex",alignItems:"center",gap:"12px"}}>
              <div style={{display:"flex",gap:"4px"}}>{champs.map(c=><img key={cCode(c)} src={cImg(c)} alt="" style={{width:"36px",borderRadius:"5px",border:"1px solid #c8a96e44"}} onError={e=>{e.target.style.visibility="hidden";}}/>)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Cinzel',serif",color:on?C.gold:C.text,fontSize:"15px",fontWeight:600}}>{s.name}</div>
                <div style={{fontSize:"12px",color:C.muted}}>{s.codes.length} cards</div>
              </div>
              {on && <div style={{color:C.gold,fontSize:"20px"}}>✓</div>}
            </div>
          );
        })}
      </div>
      <button className="btn" disabled={!sel} onClick={()=>onPick(sel, starters.find(s=>s.name===sel).codes.map(c=>({code:c,count:1})))} style={{width:"100%",marginTop:"16px",padding:"14px",background:sel?"linear-gradient(135deg,#c8a96e,#9a7440)":"#111",border:"none",borderRadius:"10px",color:sel?C.bg:C.faint,fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:900,letterSpacing:".08em"}}>{sel?("Lock in "+sel):"Select a deck"}</button>
    </div>
  );
}

function DeckView({db,deck,locked,coins,onRemove}){
  const [sellMode,setSellMode]=useState(false);
  const [sel,setSel]=useState({});
  const total=deckTotal(deck), batch=removalBatch(total), cost=removalCost(total);
  const selTotal=Object.values(sel).reduce((a,b)=>a+b,0);
  const entries=(deck||[]).map(e=>({...e,card:db.by[e.code]})).filter(e=>e.card);
  entries.sort((a,b)=>cMana(a.card)-cMana(b.card)||cName(a.card).localeCompare(cName(b.card)));
  const champs=entries.filter(e=>cChamp(e.card)), cards=entries.filter(e=>!cChamp(e.card));

  function tapSell(code){
    const have=copiesOf(deck,code);
    setSel(prev=>{ const cur=prev[code]||0; const others=Object.values(prev).reduce((a,b)=>a+b,0)-cur;
      if(cur>=have){ const n={...prev}; delete n[code]; return n; }
      if(others+cur+1>batch) return prev;
      return {...prev,[code]:cur+1}; });
  }
  function confirm(){ if(selTotal<1||selTotal>batch||coins<cost) return; onRemove(sel,cost); setSellMode(false); setSel({}); }

  const group=(title,list)=>(
    <div style={{marginBottom:"14px"}}>
      <div style={{...sLbl,marginBottom:"8px"}}>{title}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
        {list.map(e=>{ const s=sel[e.code]||0;
          return <CardThumb key={e.code} card={e.card} w={72} onClick={sellMode?()=>tapSell(e.code):undefined} badge={e.count>1?("x"+e.count):undefined} dim={sellMode&&s>0} sub={sellMode&&s>0?("- "+s):undefined}/>; })}
      </div>
    </div>
  );

  return (
    <div style={{padding:"14px 18px",maxWidth:"760px",margin:"0 auto"}} className="fu">
      <div style={{...sCard,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",padding:"12px 16px"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:"15px",fontWeight:600}}>{total} cards</div>
          <div style={{fontSize:"11px",color:C.muted}}>{uniqueChamps(db,deck)}/{ECON.MAX_CHAMPS} champions · min {ECON.DECK_FLOOR} · max {ECON.DECK_MAX}</div>
        </div>
        {locked
          ? <div style={{fontSize:"11px",color:"#a66",fontFamily:"'Cinzel',serif",textAlign:"right",maxWidth:"150px"}}>Locked for the matchday</div>
          : (!sellMode
              ? <button className="btn" disabled={batch<=0} onClick={()=>setSellMode(true)} style={{padding:"8px 14px",background:batch>0?"#2a1410":"#111",border:"1px solid "+(batch>0?"#cc664455":"#333"),borderRadius:"8px",color:batch>0?"#e8a488":C.faint,fontFamily:"'Cinzel',serif",fontSize:"12px"}}>Buy removal</button>
              : <button className="btn" onClick={()=>{setSellMode(false);setSel({});}} style={{padding:"8px 14px",background:"transparent",border:"1px solid #333",borderRadius:"8px",color:C.muted,fontFamily:"'Cinzel',serif",fontSize:"12px"}}>Cancel</button>)}
      </div>
      {sellMode && (
        <div style={{...sCard,marginBottom:"12px",padding:"12px 16px",background:"#1a0f0a",borderColor:"#cc664433"}}>
          <div style={{fontSize:"12.5px",color:"#e8b9a8",lineHeight:1.6,marginBottom:"10px"}}><strong style={{color:"#ffd9c8"}}>Remove up to {batch} {batch===1?"card":"cards"}.</strong> You don't have to remove them all. It costs <strong style={{color:C.gold}}>{cost} coins</strong> no matter how many you remove (down to a minimum deck of {ECON.DECK_FLOOR}). Tap a card to select it; tap again to add more copies.</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"10px"}}>
            <div style={{fontSize:"13px",color:C.text}}>Selected {selTotal}/{batch} · cost {cost}{coins<cost?" (not enough coins)":""}</div>
            <button className="btn" disabled={selTotal<1||coins<cost} onClick={confirm} style={{flexShrink:0,padding:"8px 16px",background:selTotal>=1&&coins>=cost?"linear-gradient(135deg,#cc6644,#aa4422)":"#111",border:"none",borderRadius:"8px",color:selTotal>=1&&coins>=cost?"#fff":C.faint,fontFamily:"'Cinzel',serif",fontSize:"12px",fontWeight:700}}>Confirm ({selTotal})</button>
          </div>
        </div>
      )}
      {champs.length>0 && group("Champions ("+champs.reduce((s,e)=>s+e.count,0)+")",champs)}
      {group("Cards ("+cards.reduce((s,e)=>s+e.count,0)+")",cards)}
    </div>
  );
}

function Store({db,deck,coins,locked,onBuy}){
  const [q,setQ]=useState("");
  const [reg,setReg]=useState("all");
  let list=db.list;
  if(reg!=="all") list=list.filter(c=>cRegs(c).indexOf(reg)>=0||cRegs(c).indexOf("Runeterra ("+reg+")")>=0);
  if(q.trim()){ const ql=q.toLowerCase(); list=list.filter(c=>cName(c).toLowerCase().indexOf(ql)>=0); }
  const shown=list.slice(0,120);
  return (
    <div style={{padding:"14px 18px",maxWidth:"860px",margin:"0 auto"}} className="fu">
      <div style={{...sCard,marginBottom:"12px",padding:"12px 14px"}}>
        <div style={{fontSize:"12px",color:C.muted,marginBottom:"8px",lineHeight:1.5}}>Buy any card directly for its coin price. {locked?"Locked for the matchday.":""}</div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search cards" style={{...sInp,marginBottom:"8px",fontSize:"15px"}}/>
        <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
          <button className="btn" onClick={()=>setReg("all")} style={rTab(reg==="all")}>All</button>
          {REGIONS.map(r=><button key={r} className="btn" onClick={()=>setReg(r)} style={rTab(reg===r,REGCOL[r])}>{r}</button>)}
        </div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
        {shown.map(c=>{ const block=deckRuleBlock(db,deck,cCode(c)); const price=cCoin(c); const can=!locked&&!block&&coins>=price;
          return (
            <div key={cCode(c)} style={{width:"92px"}}>
              <CardThumb card={c} w={92} badge={price} dim={!!block}/>
              <button className="btn" disabled={!can} onClick={()=>onBuy(cCode(c),price)} style={{width:"100%",marginTop:"3px",padding:"4px 2px",background:can?"#c8a96e18":"#0d0f18",border:"1px solid "+(can?"#c8a96e55":"#222"),borderRadius:"6px",color:can?C.gold:"#666",fontFamily:"'Cinzel',serif",fontSize:"10px"}}>{block?block:(locked?"Locked":(coins<price?("Need "+price):("Buy "+price)))}</button>
            </div>
          ); })}
      </div>
      {shown.length===0 && <div style={{...sCard,textAlign:"center",color:C.muted,marginTop:"10px"}}>No cards found.</div>}
      {list.length>120 && <div style={{textAlign:"center",color:C.muted,fontSize:"12px",marginTop:"12px"}}>Showing first 120 · refine with search or a region.</div>}
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [data,setData]=useState(null);
  const [me,setMe]=useState(()=>{ try{return sessionStorage.getItem("at_me")||null;}catch(e){return null;} });
  const [spectator,setSpectator]=useState(false);
  const [db,setDb]=useState(null);
  const [starters,setStarters]=useState(null);

  useEffect(()=>{
    Promise.all([fetch("./cards.json").then(r=>r.json()), fetch("./starter.json").then(r=>r.json())])
      .then(([cards,st])=>{ setDb(buildDB(cards)); setStarters(st); })
      .catch(e=>console.error("card data load failed:",e));
  },[]);

  useEffect(()=>{
    if(!CONFIG_OK) return;
    const cb = stateRef.on("value", snap=>{
      const val=snap.val();
      if(val===null){ stateRef.set(SEED); return; }
      setData(val);
    }, err=>{ console.error("Firebase:",err); });
    return ()=>stateRef.off("value", cb);
  },[]);

  function mutate(fn){
    setData(prev=>{
      const next=fn(JSON.parse(JSON.stringify(prev||SEED)));
      if(stateRef) stateRef.set(next);
      return next;
    });
  }
  function login(n){ setMe(n); try{sessionStorage.setItem("at_me",n);}catch(e){} }
  function register(n){ mutate(d=>{ if(!d.pending)d.pending={}; d.pending[n]={password:genPw(),ts:Date.now()}; return d; }); }
  function logout(){ setMe(null); setSpectator(false); try{sessionStorage.removeItem("at_me");}catch(e){} }

  if(!CONFIG_OK) return <SetupScreen/>;
  if(!data) return <Loading/>;
  if(spectator) return <Spectator data={data} onLeave={()=>setSpectator(false)}/>;
  if(!me || !(data.users && data.users[me])) {
    // not logged in (or account no longer exists) → login
    return <Login data={data} onLogin={login} onSpectator={()=>setSpectator(true)} onRegister={register}/>;
  }

  const role=data.users[me].role;
  return (
    <div style={{minHeight:"100vh"}}>
      <TopBar me={me} role={role} coins={data.users[me].coins} onLogout={logout}/>
      {role==="admin" ? <AdminHome data={data} mutate={mutate}/> : (db&&starters ? <PlayerHome data={data} me={me} db={db} starters={starters} mutate={mutate}/> : <Loading/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
